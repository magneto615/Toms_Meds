  .nav-title{font-size:17px;font-weight:600;letter-spacing:-0.4px}
  .nav-right{position:absolute;right:16px;top:50%;transform:translateY(-50%)}
  .sync-indicator{font-size:12px;color:var(--ios-lbl3);display:flex;align-items:center;gap:5px}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ios-lbl3);flex-shrink:0;transition:background 0.3s}
  .sync-dot.green{background:var(--ios-green)}
  .sync-dot.orange{background:var(--ios-orange)}
  .sync-dot.red{background:var(--ios-red)}

  .tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(28,28,30,0.92);backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);border-top:0.5px solid var(--ios-sep);padding-bottom:env(safe-area-inset-bottom,20px);display:flex}

  .custom-row{display:flex;gap:10px;align-items:center;margin-bottom:14px}

  .action-btn{width:100%;padding:15px;border-radius:var(--r-md);border:none;font-family:var(--sf);font-size:17px;font-weight:600;cursor:pointer;transition:opacity 0.15s,transform 0.1s;margin-bottom:10px;letter-spacing:-0.2px}

  .btn-red{background:rgba(255,69,58,0.15);color:var(--ios-red);border:1.5px solid rgba(255,69,58,0.3)}

  .empty-title{font-size:20px;font-weight:600;color:var(--ios-lbl);margin-bottom:8px}

  .copy-btn{display:block;width:calc(100% - 32px);margin:0 16px 20px;padding:15px;border-radius:var(--r-md);border:none;background:var(--ios-fill);color:var(--ios-blue);font-family:var(--sf);font-size:17px;font-weight:600;cursor:pointer;text-align:center;transition:opacity 0.15s}

  .confirm-inner{background:var(--ios-bg2);border-radius:var(--r-lg);overflow:hidden;margin-bottom:8px}
  .confirm-title-row{padding:14px 16px 10px;text-align:center}
  .confirm-title{font-size:13px;font-weight:600}
  .confirm-msg{font-size:13px;color:var(--ios-lbl2);margin-top:4px;line-height:1.4;white-space:pre-line}
  .confirm-divider{height:0.5px;background:var(--ios-sep)}
  .confirm-act{width:100%;padding:14px;border:none;background:none;font-family:var(--sf);font-size:17px;cursor:pointer;text-align:center;transition:background 0.1s}
  .confirm-act:active{background:var(--ios-fill)}
  .confirm-act.destr{color:var(--ios-red)}
  .confirm-act.prim{color:var(--ios-blue);font-weight:600}
  .confirm-cancel{width:100%;padding:14px;border:none;background:var(--ios-bg2);border-radius:var(--r-lg);font-family:var(--sf);font-size:17px;font-weight:600;color:var(--ios-blue);cursor:pointer}
  .confirm-cancel:active{background:var(--ios-bg3)}

  .toast{position:fixed;z-index:500;top:calc(env(safe-area-inset-top,44px) + 60px);left:16px;right:16px;background:rgba(44,44,46,0.97);border-radius:var(--r-md);padding:13px 16px;font-size:15px;font-weight:500;display:flex;align-items:center;gap:10px;backdrop-filter:blur(20px);box-shadow:0 4px 24px rgba(0,0,0,0.4);transform:translateY(-20px);opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none}
  .toast.show{transform:translateY(0);opacity:1}
  .toast-icon{font-size:20px;flex-shrink:0}

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
</style>

function pillCount(med, dose) {
  if (!med.tabletMg || med.doseUnit==='tablet' || med.doseUnit==='units') return '';

let openMedId  = null;
let confirmCb  = null;
const medState = {};

function getState(medId) {
  if (!medState[medId]) {
    const med = MEDS.find(m=>m.id===medId);
    medState[medId] = {selectedDose:med.defaultDose, useCustom:false, customVal:'', pastVal:''};
  }
  return medState[medId];
}

function saveLogs() { localStorage.setItem('tomMedLogs_v2', JSON.stringify(logs)); }

function getLastLog(medId) {
  const ml = logs.filter(l=>l.medId===medId);
  return ml.length ? ml.reduce((a,b)=>a.time>b.time?a:b) : null;
}
function canTake(med) {
  const last=getLastLog(med.id); if(!last) return {ok:true,msLeft:0};
  const elapsed=Date.now()-last.time, iv=med.intervalHours*3600000;
  return elapsed>=iv ? {ok:true,msLeft:0} : {ok:false,msLeft:iv-elapsed};
}
function getEffectiveDose(medId) {
  const med=MEDS.find(m=>m.id===medId), s=getState(medId);
  if (med.hasCustom && s.useCustom) { const v=parseFloat(s.customVal); return isNaN(v)?s.selectedDose:v; }
  return s.selectedDose;
}

// ─── FORMAT ───────────────────────────────────────────────────────────────────
function fmtCountdown(ms) {
  const s=Math.ceil(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h>0) return `${h}h ${m}m`; if(m>0) return `${m}m ${sec}s`; return `${sec}s`;
}
function fmtTime(ts) { return new Date(ts).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}); }
function fmtDate(ts) {
  const d=new Date(ts),t=new Date(),y=new Date(t); y.setDate(t.getDate()-1);
  if(d.toDateString()===t.toDateString()) return 'Today';
  if(d.toDateString()===y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([],{weekday:'long',month:'short',day:'numeric'});
}
function fmtDateTime(ts) { return `${fmtDate(ts)} at ${fmtTime(ts)}`; }
function localDTVal(ts) {
  const d=new Date(ts),p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}

// ─── SYNC STATUS UI ───────────────────────────────────────────────────────────
function setSyncStatus(status, label) {
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  if (!dot) return;
  dot.className='sync-dot'+(status==='ok'?' green':status==='syncing'?' orange':status==='error'?' red':'');
  lbl.textContent=label||'';
}

// ─── SUPABASE: PUSH ONE ENTRY ─────────────────────────────────────────────────
async function pushEntry(entry) {
  const med=MEDS.find(m=>m.id===entry.medId);
  try {
    setSyncStatus('syncing','Saving…');
    await supaFetch('POST', TABLE, {
      entry_id: entry.id,
      med_id:   entry.medId,
      med_brand:med ? med.brand : entry.medId,
      time:     entry.time,
      dose:     entry.dose,
      unit:     entry.unit,
      past:     !!entry.past,
      override: !!entry.override
    });
    setSyncStatus('ok','Saved');
    setTimeout(()=>setSyncStatus('',''),2000);
  } catch(e) {
    console.warn('Supabase push failed:', e);
    setSyncStatus('error','Sync error');
    setTimeout(()=>setSyncStatus('',''),4000);
  }
}

// ─── SUPABASE: DELETE ONE ENTRY ───────────────────────────────────────────────
async function deleteFromCloud(entryId) {
  try {
    setSyncStatus('syncing','Deleting…');
    await supaFetch('DELETE', `${TABLE}?entry_id=eq.${entryId}`, null);
    setSyncStatus('ok','Deleted');
    setTimeout(()=>setSyncStatus('',''),2000);
  } catch(e) {
    console.warn('Supabase delete failed:', e);
    setSyncStatus('error','Delete error');
    setTimeout(()=>setSyncStatus('',''),4000);
  }
}

// ─── SUPABASE: LOAD ALL FROM CLOUD ───────────────────────────────────────────
async function loadFromCloud() {
  try {
    setSyncStatus('syncing','Loading…');
    const rows = await supaFetch('GET', `${TABLE}?order=time.asc`, null);
    if (rows && rows.length >= 0) {
      // Cloud is the single source of truth — replace local entirely
      logs = rows.map(r=>({
        id:       r.entry_id,
        medId:    r.med_id,
        time:     r.time,
        dose:     r.dose,
        unit:     r.unit,
        past:     r.past,
        override: r.override
      }));
      saveLogs();
    }
    setSyncStatus('ok','Synced');
    setTimeout(()=>setSyncStatus('',''),2000);
    render();
  } catch(e) {
    console.warn('Supabase load failed:', e);
    setSyncStatus('error','Offline — local data');
    setTimeout(()=>setSyncStatus('',''),4000);
  }
}

// ─── SUPABASE: CHECK SYNC ─────────────────────────────────────────────────────
async function checkSyncStatus() {
  const el=document.getElementById('sync-check-result');
  if (!el) return;
  try {
    const rows = await supaFetch('GET', `${TABLE}?select=entry_id`, null);
    const cloudCount = rows ? rows.length : 0;
    const localCount = logs.length;
    if (cloudCount===localCount) {
      el.textContent=`✅ In sync (${cloudCount} entries)`;
      el.style.color='var(--ios-green)';
    } else {
      el.textContent=`⚠️ Local: ${localCount} · Cloud: ${cloudCount}`;
      el.style.color='var(--ios-orange)';
    }
  } catch(e) {
    el.textContent='📵 Offline — can\'t check';
    el.style.color='var(--ios-lbl3)';
  }
}

// ─── LOG DOSE ─────────────────────────────────────────────────────────────────
function logDose(medId, overrideTime, isPast, isOverride) {
  const med=MEDS.find(m=>m.id===medId);
  const dose=getEffectiveDose(medId);
  const time=overrideTime||Date.now();
  const entry={id:Date.now()+Math.random(), medId, time, dose, unit:med.doseUnit, past:!!isPast, override:!!isOverride};
  logs.push(entry);
  saveLogs();
  pushEntry(entry);
  closeSheet();
  const icon=isOverride?'⚠️':isPast?'↩':'✓';
  const msg=isOverride?`Override — ${med.brand} ${dose}${med.doseUnit}${pillCount(med,dose)}`
           :isPast    ?`Past dose — ${med.brand} ${dose}${med.doseUnit}${pillCount(med,dose)}`
           :            `${med.brand} ${dose}${med.doseUnit}${pillCount(med,dose)} logged`;
  showToast(icon,msg);
  render();
}

// ─── DELETE ───────────────────────────────────────────────────────────────────
function askDelete(logId) {
  const log=logs.find(l=>l.id===logId); if(!log) return;
  const med=MEDS.find(m=>m.id===log.medId);
  showConfirm('Delete Entry?',
    `${med?med.brand:log.medId} — ${log.dose}${log.unit}\n${fmtDateTime(log.time)}`,
    'Delete Entry', true,
    () => {
      logs=logs.filter(l=>l.id!==logId);
      saveLogs();
      deleteFromCloud(logId); // ← also deletes from Supabase
      showToast('🗑','Entry deleted');
      render();
    }
  );
}

// ─── CONFIRM ──────────────────────────────────────────────────────────────────
function showConfirm(title,msg,actionLabel,destructive,cb) {
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-msg').textContent=msg;
  const btn=document.getElementById('confirm-act-btn');
  btn.textContent=actionLabel; btn.className='confirm-act '+(destructive?'destr':'prim');
  confirmCb=cb;
  document.getElementById('confirm-overlay').classList.add('show');
  document.getElementById('confirm-sheet').classList.add('show');
}
function runConfirm()  { closeConfirm(); if(confirmCb){confirmCb();confirmCb=null;} }
function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('show');
  document.getElementById('confirm-sheet').classList.remove('show');
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(icon,msg) {
  document.getElementById('toast-icon').textContent=icon;
  document.getElementById('toast-text').textContent=msg;
  const t=document.getElementById('toast');
  t.classList.add('show'); clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

// ─── SHEET ────────────────────────────────────────────────────────────────────
function openSheet(medId) {
  openMedId=medId; renderSheet(medId);
  document.getElementById('sheet-overlay').classList.add('show');
  document.getElementById('med-sheet').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('show');
  document.getElementById('med-sheet').classList.remove('show');
  document.body.style.overflow=''; openMedId=null;
}

function renderSheet(medId) {
  const med=MEDS.find(m=>m.id===medId);
  const {ok,msLeft}=canTake(med);
  const last=getLastLog(medId);
  const s=getState(medId);

  document.getElementById('sheet-title').textContent=med.brand;
  document.getElementById('sheet-subtitle').textContent=`${med.generic} · ${med.note}`;

  const lastHtml=last
    ?`<div class="last-block"><div class="last-lbl">Last Taken</div>
       <div class="last-val">${fmtDateTime(last.time)}</div>
       <div class="last-sub">${last.dose}${last.unit}${pillCount(med,last.dose)}${last.past?' · past entry':''}${last.override?' · override':''}</div>
      </div>`
    :`<div class="last-block" style="color:var(--ios-lbl2);font-size:15px">No doses logged yet</div>`;

  let doseHtml='<div class="dose-lbl">Dose</div><div class="dose-chips" id="dose-chips-wrap">';
  med.doseOptions.forEach(d=>{
    const sel=!s.useCustom&&d===s.selectedDose;
    doseHtml+=`<button class="dose-chip ${sel?'sel':''}" onclick="selectDose('${medId}',${d})">${d}${med.doseUnit}${pillCount(med,d)}</button>`;
  });
  if(med.hasCustom) doseHtml+=`<button class="dose-chip custom-chip ${s.useCustom?'sel':''}" id="custom-chip-btn" onclick="activateCustom('${medId}')">Custom</button>`;
  doseHtml+='</div>';
  if(s.useCustom) {
    doseHtml+=`<div class="custom-row"><input class="custom-input" id="custom-dose-input" type="number" step="0.5" min="0.5" placeholder="Enter dose" value="${s.customVal}" oninput="onCustomInput('${medId}',this.value)"><span class="custom-unit">${med.doseUnit}</span></div>`;
  }

  const effDose=s.useCustom?(s.customVal?`${s.customVal}${med.doseUnit}${pillCount(med,parseFloat(s.customVal)||0)}`:`?${med.doseUnit}`):`${s.selectedDose}${med.doseUnit}${pillCount(med,s.selectedDose)}`;
  let actionHtml=ok
    ?`<button class="action-btn btn-green" id="main-action-btn" onclick="logDose('${medId}')">OK to Take — ${effDose}</button>`
    :`<button class="action-btn btn-disabled" id="main-action-btn">Not yet — ${fmtCountdown(msLeft)}</button>
      <button class="action-btn btn-red" onclick="askOverride('${medId}')">⚠️ Override &amp; Log Anyway</button>`;

  document.getElementById('sheet-body').innerHTML=`${lastHtml}${doseHtml}${actionHtml}`;
  if(s.useCustom) setTimeout(()=>{const el=document.getElementById('custom-dose-input');if(el)el.focus();},80);
}

function selectDose(medId,dose) {
  const s=getState(medId); s.selectedDose=dose; s.useCustom=false;
  document.querySelectorAll('#dose-chips-wrap .dose-chip').forEach(btn=>{
    if(btn.id==='custom-chip-btn'){btn.classList.remove('sel');return;}
    btn.classList.toggle('sel',parseFloat(btn.textContent)===dose);
  });
  const cr=document.querySelector('.custom-row'); if(cr) cr.remove();
  updateActionBtn(medId);
}
function activateCustom(medId) { getState(medId).useCustom=true; renderSheet(medId); }
function onCustomInput(medId,val) { getState(medId).customVal=val; updateActionBtn(medId); }
function updateActionBtn(medId) {
  const med=MEDS.find(m=>m.id===medId),{ok}=canTake(med),s=getState(medId);
  const effDose=s.useCustom?(s.customVal?`${s.customVal}${med.doseUnit}${pillCount(med,parseFloat(s.customVal)||0)}`:`?${med.doseUnit}`):`${s.selectedDose}${med.doseUnit}${pillCount(med,s.selectedDose)}`;
  const btn=document.getElementById('main-action-btn');
  if(btn&&ok) btn.textContent=`OK to Take — ${effDose}`;
}
function askOverride(medId) {
  const med=MEDS.find(m=>m.id===medId),{msLeft}=canTake(med);
  showConfirm('Log Early?',`${med.brand} is not due for another ${fmtCountdown(msLeft)}.\nLog it anyway?`,'Log Override',true,()=>logDose(medId,null,false,true));
}

// ─── TAB SWITCH ───────────────────────────────────────────────────────────────
const TAB_TITLES={tracker:"Tom's Medications",past:'Log Past Dose',history:'History'};
function switchTab(tab) {
  currentTab=tab;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  render(); window.scrollTo(0,0);
}

// ─── RENDER TRACKER ───────────────────────────────────────────────────────────
function renderTracker() {
  const available=MEDS.filter(m=>{
    const last=getLastLog(m.id); if(!last) return false;
    const elapsed=Date.now()-last.time,iv=m.intervalHours*3600000;
    return elapsed>=iv&&elapsed<iv+1800000;
  });
  let html='<div style="height:8px"></div>';
  if(available.length) {
    html+=`<div class="alert-card"><div class="alert-title">⏰ Now Available</div>
      <div class="alert-body">${available.map(m=>`<strong>${m.brand}</strong>`).join(', ')} can now be taken.</div></div>`;
  }
  html+='<div style="margin:0 16px 20px"><div class="list-group">';
  MEDS.forEach(med=>{
    const {ok,msLeft}=canTake(med),last=getLastLog(med.id);
    const pct=last?Math.min(100,(Date.now()-last.time)/(med.intervalHours*3600000)*100):100;
    const barCls=pct<50?'low':pct<80?'mid':'';
    const readyLabel=(med.id==='dilaudid'||med.id==='valium')?'OK to Take':'Take Now';
    const badge=ok?`<span class="status-pill pill-ok">${readyLabel}</span>`:`<span class="status-pill pill-wait">${fmtCountdown(msLeft)}</span>`;
    const lastSub=last?`Last: ${fmtTime(last.time)} · ${last.dose}${last.unit}${pillCount(med,last.dose)}`:'No doses logged';
    html+=`<div class="list-row" onclick="openSheet('${med.id}')">
      <div class="med-icon ${med.color}">${med.emoji}</div>
      <div class="med-text">
        <div class="med-name">${med.brand}</div>
        <div class="med-generic">${med.generic}</div>
        <div class="prog-track"><div class="prog-fill ${barCls}" style="width:${pct}%"></div></div>
        <div class="med-sub">${lastSub}</div>
      </div>
      <div class="med-right">${badge}<span class="chev">›</span></div>
    </div>`;
  });
  html+='</div></div>';
  document.getElementById('tracker-content').innerHTML=html;
}

// ─── RENDER PAST ──────────────────────────────────────────────────────────────
function renderPast() {
  let html='<div style="height:8px"></div>';
  html+=`<div style="margin:0 16px 14px;padding:0 4px;font-size:14px;color:var(--ios-lbl2);line-height:1.5">Select a medication, choose the dose, and enter the time it was actually taken.</div>`;
  html+='<div style="margin:0 16px 20px"><div class="list-group">';
  MEDS.forEach(med=>{
    html+=`<div class="list-row" onclick="openPastSheet('${med.id}')">
      <div class="med-icon ${med.color}">${med.emoji}</div>
      <div class="med-text"><div class="med-name">${med.brand}</div><div class="med-generic">${med.generic}</div></div>
      <span class="chev">›</span></div>`;
  });
  html+='</div></div>';
  document.getElementById('past-content').innerHTML=html;
}

function openPastSheet(medId) {
  const med=MEDS.find(m=>m.id===medId),s=getState(medId);
  document.getElementById('sheet-title').textContent=med.brand;
  document.getElementById('sheet-subtitle').textContent=`${med.generic} · Log a past dose`;

  let doseHtml='<div class="dose-lbl">Dose</div><div class="dose-chips" id="dose-chips-wrap">';
  med.doseOptions.forEach(d=>{
    const sel=!s.useCustom&&d===s.selectedDose;
    doseHtml+=`<button class="dose-chip ${sel?'sel':''}" onclick="selectDosePast('${medId}',${d})">${d}${med.doseUnit}${pillCount(med,d)}</button>`;
  });
  if(med.hasCustom) doseHtml+=`<button class="dose-chip custom-chip ${s.useCustom?'sel':''}" id="custom-chip-btn" onclick="activateCustomPast('${medId}')">Custom</button>`;
  doseHtml+='</div>';
  if(s.useCustom) {
    doseHtml+=`<div class="custom-row"><input class="custom-input" id="custom-dose-input" type="number" step="0.5" min="0.5" placeholder="Enter dose" value="${s.customVal}" oninput="onCustomInputPast('${medId}',this.value)"><span class="custom-unit">${med.doseUnit}</span></div>`;
  }
  const nowStr=localDTVal(Date.now()),savedVal=s.pastVal||nowStr;
  const pastBlock=`<div class="past-inner"><div class="past-lbl">When was it taken?</div>
    <input class="past-datetime" id="past-dt-input" type="datetime-local" max="${nowStr}" value="${savedVal}" onchange="getState('${medId}').pastVal=this.value">
  </div>`;
  const effDose=s.useCustom?(s.customVal?`${s.customVal}${med.doseUnit}`:`?${med.doseUnit}`):`${s.selectedDose}${med.doseUnit}${pillCount(med,s.selectedDose)}`;
  document.getElementById('sheet-body').innerHTML=`${doseHtml}${pastBlock}<button class="action-btn btn-orange" id="past-log-btn" onclick="submitPast('${medId}')">↩ Log Past Dose — ${effDose}</button>`;
  document.getElementById('sheet-overlay').classList.add('show');
  document.getElementById('med-sheet').classList.add('show');
  document.body.style.overflow='hidden';
}

function selectDosePast(medId,dose) {
  const s=getState(medId); s.selectedDose=dose; s.useCustom=false;
  document.querySelectorAll('#dose-chips-wrap .dose-chip').forEach(btn=>{
    if(btn.id==='custom-chip-btn'){btn.classList.remove('sel');return;}
    btn.classList.toggle('sel',parseFloat(btn.textContent)===dose);
  });
  const cr=document.querySelector('.custom-row'); if(cr) cr.remove();
  updatePastBtn(medId);
}
function activateCustomPast(medId) {
  const inp=document.getElementById('past-dt-input'); if(inp) getState(medId).pastVal=inp.value;
  getState(medId).useCustom=true; openPastSheet(medId);
}
function onCustomInputPast(medId,val) { getState(medId).customVal=val; updatePastBtn(medId); }
function updatePastBtn(medId) {
  const med=MEDS.find(m=>m.id===medId),s=getState(medId);
  const effDose=s.useCustom?(s.customVal?`${s.customVal}${med.doseUnit}${pillCount(med,parseFloat(s.customVal)||0)}`:`?${med.doseUnit}`):`${s.selectedDose}${med.doseUnit}${pillCount(med,s.selectedDose)}`;
  const btn=document.getElementById('past-log-btn'); if(btn) btn.textContent=`↩ Log Past Dose — ${effDose}`;
}
function submitPast(medId) {
  const inp=document.getElementById('past-dt-input');
  if(!inp||!inp.value){showToast('⚠️','Please pick a date & time');return;}
  const ts=new Date(inp.value).getTime();
  if(isNaN(ts)){showToast('⚠️','Invalid date/time');return;}
  if(ts>Date.now()){showToast('⚠️','Time cannot be in the future');return;}
  getState(medId).pastVal=inp.value;
  logDose(medId,ts,true,false);
  getState(medId).pastVal='';
}

// ─── RENDER HISTORY ───────────────────────────────────────────────────────────
function renderHistory() {
  let html='<div style="height:8px"></div>';

  // Sync check bar — always shown at top of history
  html+=`<div class="sync-bar">
    <div class="sync-bar-label">☁️ Cloud sync</div>
    <div class="sync-bar-result" id="sync-check-result">Checking…</div>
  </div>`;
  setTimeout(checkSyncStatus, 300);

  if(!logs.length) {
    html+='<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">No History Yet</div><div>Start logging doses in the Tracker tab.</div></div>';
    document.getElementById('history-content').innerHTML=html;
    return;
  }

  const sorted=[...logs].sort((a,b)=>b.time-a.time);
  const byDay={};
  sorted.forEach(log=>{const d=fmtDate(log.time);if(!byDay[d])byDay[d]=[];byDay[d].push(log);});

  Object.entries(byDay).forEach(([day,entries])=>{
    html+=`<div style="padding:0 16px 6px"><div class="list-header">${day}</div></div><div style="margin:0 16px 16px"><div class="list-group">`;
    entries.forEach(log=>{
      const med=MEDS.find(m=>m.id===log.medId); if(!med) return;
      const dotColor=log.override?'var(--ios-red)':log.past?'var(--ios-orange)':'var(--ios-green)';
      const tag=log.override?' · override':log.past?' · past entry':'';
      html+=`<div class="list-row" style="cursor:default">
        <div class="hist-dot" style="background:${dotColor}"></div>
        <div class="med-text"><div class="med-name">${med.brand}</div><div class="med-generic">${med.generic}${tag}</div></div>
        <div class="med-right" style="gap:12px">
          <div style="text-align:right">
            <div style="font-size:14px;font-weight:500">${log.dose}${log.unit}${pillCount(med,log.dose)}</div>
            <div style="font-size:12px;color:var(--ios-lbl2)">${fmtTime(log.time)}</div>
          </div>
          <button class="hist-del" onclick="askDelete(${log.id})">✕</button>
        </div></div>`;
    });
    html+='</div></div>';
  });

  html+=`<button class="copy-btn" onclick="copyToNotes()">📋 Copy for Notes App</button>`;
  document.getElementById('history-content').innerHTML=html;
}

// ─── COPY TO NOTES ────────────────────────────────────────────────────────────
function copyToNotes() {
  if(!logs.length){showToast('⚠️','No history to copy');return;}
  const sorted=[...logs].sort((a,b)=>b.time-a.time);
  const byDay={};
  sorted.forEach(log=>{const d=fmtDate(log.time);if(!byDay[d])byDay[d]=[];byDay[d].push(log);});
  let text="Tom's Medication Log\n";
  text+=`Generated: ${new Date().toLocaleDateString([],{weekday:'long',year:'numeric',month:'long',day:'numeric'})}\n${'─'.repeat(32)}\n\n`;
  Object.entries(byDay).forEach(([day,entries])=>{
    text+=`${day}\n`;
    entries.forEach(log=>{
      const med=MEDS.find(m=>m.id===log.medId);
      const tags=[log.past?'past':'',log.override?'override':''].filter(Boolean).join(', ');
      text+=`  ${fmtTime(log.time).padEnd(10)} ${(med?med.brand:log.medId).padEnd(14)} ${log.dose}${log.unit}${med?pillCount(med,log.dose):''}${tags?' ['+tags+']':''}\n`;
    });
    text+='\n';
  });
  navigator.clipboard.writeText(text).then(()=>showToast('📋','Copied! Paste into Notes')).catch(()=>prompt('Copy and paste into Notes:',text));
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  if(currentTab==='tracker') renderTracker();
  else if(currentTab==='past') renderPast();
  else renderHistory();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
setInterval(render, 10000);
render();
