function availability(med,group){if(med.archived)return{ok:false,label:'Archived',detail:'Archived medications cannot be logged',blocked:false,needsOverride:false,kind:'archived'};if(med.is_pain)return{ok:true,label:'OK to Take',detail:'Pain level',blocked:false,needsOverride:false,kind:'ok'};const prog=packProgress(med);if(prog?.done)return{ok:false,label:'Complete',detail:'Pack complete',blocked:false,needsOverride:false,kind:'complete'};if(group&&group!=='prn'&&completedGroupToday(med,group))return{ok:false,label:'Completed',detail:`${SCHEDULE_GROUPS[group]} completed`,blocked:false,needsOverride:true,kind:'logged'};const seq=sequenceBlock(med,group);if(seq)return{ok:false,label:seq.label,detail:seq.detail,blocked:false,needsOverride:true,kind:'sequence'};const blocks=conflictWarnings(med.id);if(blocks.length)return{ok:false,label:'Blocked',detail:`Conflict with ${blocks[0].other.brand} for ${waitText(blocks[0].clearTs-Date.now())}`,blocked:true,needsOverride:true,kind:'blocked',conflictMed:blocks[0].other.brand};const last=lastLog(med.id),iv=Number(med.interval_hours||0)*3600000;if(last&&iv>0){const next=last.loggedTime+iv;if(Date.now()<next)return{ok:false,label:waitText(next-Date.now()),detail:'Interval wait',blocked:true,needsOverride:true,kind:'countdown',earlyMs:next-Date.now()}}if(group&&group!=='prn')return{ok:true,label:'Take Now',detail:'Ready for this scheduled dose',blocked:false,needsOverride:false,kind:'take'};return{ok:true,label:'OK to Take',detail:last?`Last ${since(last.loggedTime)}`:'OK to take now',blocked:false,needsOverride:false,kind:'ok'}}

function rangeStart(range){
  const now=Date.now();
  if(range==='day') return now-24*60*60*1000;
  if(range==='month') return now-30*24*60*60*1000;
  return now-7*24*60*60*1000;
}
function painMed(){
  return meds.find(m=>m.is_pain||String(m.brand||'').toLowerCase()==='pain level')||null;
}
function painLogsInRange(range){
  const pain=painMed();
  const start=rangeStart(range);
  if(!pain) return [];
  return logs
    .filter(l=>l.medication_id===pain.id && l.loggedTime>=start && Number.isFinite(Number(l.dose)))
    .sort((a,b)=>a.loggedTime-b.loggedTime);
}
function dayStartMs(ms){const d=new Date(Number(ms));d.setHours(0,0,0,0);return d.getTime();}
function dailyMedicationTrend(selected,range){
  if(!selected) return [];
  const days=range==='month'?30:7;
  const today=dayStartMs(Date.now());
  const rangeStartDay=today-(days-1)*86400000;
  const rangeEnd=today+86400000;
  const medLogsInRange=logs
    .filter(l=>l.medication_id===selected.id && l.loggedTime>=rangeStartDay && l.loggedTime<rangeEnd && Number.isFinite(Number(l.dose)))
    .sort((a,b)=>a.loggedTime-b.loggedTime);

  // For medications, do not include leading zero days before the first logged dose in the selected range.
  // This keeps a 30-day view from skewing trend/average when the medication only started recently.
  if(!medLogsInRange.length) return [];
  const firstDoseDay=dayStartMs(medLogsInRange[0].loggedTime);
  const start=Math.max(rangeStartDay,firstDoseDay);
  const effectiveDays=Math.floor((today-start)/86400000)+1;

  const buckets=Array.from({length:effectiveDays},(_,i)=>{
    const ts=start+i*86400000;
    return {x:ts+12*3600000,y:0,dayStart:ts,logs:[]};
  });
  const byDay=new Map(buckets.map(b=>[b.dayStart,b]));
  medLogsInRange.forEach(l=>{
    const key=dayStartMs(l.loggedTime);
    const b=byDay.get(key);
    if(b){b.y+=Number(l.dose);b.logs.push(l);}
  });
  return buckets;
}
function trendData(selected,selectedId,range){
  if(selectedId==='pain'){
    return painLogsInRange(range).map(l=>({x:l.loggedTime,y:Number(l.dose),log:l}));
  }
  if(!selected) return [];
  return dailyMedicationTrend(selected,range==='month'?'month':'week');
}

function renderInsights(){
  const pain=meds.find(m=>m.is_pain||String(m.brand||'').toLowerCase()==='pain level');
  if(insightsMedId==='pain'&&!pain)insightsMedId=meds[0]?.id||'pain';
  const isPain=insightsMedId==='pain';
  if(!isPain && insightsRange==='day') insightsRange='week';
  const options=[
    pain?`<option value="pain" ${insightsMedId==='pain'?'selected':''}>Pain Level</option>`:'',
    ...meds.filter(m=>!m.archived&&!m.is_pain).map(m=>`<option value="${m.id}" ${insightsMedId===m.id?'selected':''}>${esc(m.brand)}</option>`)
  ].join('');
  const selected=isPain?pain:getMed(insightsMedId);
  const label=isPain?'Pain Level':(selected?.brand||'Medication');
  const trend=trendData(selected,insightsMedId,insightsRange);
  const stats=trendStats(trend,label,isPain);
  const rangeValues=isPain?['day','week','month']:['week','month'];
  const rangeToggle=rangeValues.map(v=>`<button class="range-btn ${insightsRange===v?'active':''}" onclick="insightsRange='${v}';renderInsights()">${v==='day'?'24h':v==='week'?'7d':'30d'}</button>`).join('');
  const countLabel=isPain?'Entries':'Days';
  const subcopy=isPain
    ? 'Pain entries are shown as individual readings.'
    : 'Medication entries are grouped as daily dose totals; leading zero days before the first dose are ignored.';
  qs('page-insights').innerHTML=`<div class="panel"><div class="panel-title">Insights</div><div class="muted">${subcopy}</div><div class="insight-controls"><select class="select" onchange="insightsMedId=this.value;if(insightsMedId!=='pain'&&insightsRange==='day')insightsRange='week';renderInsights()">${options}</select><div class="range-toggle">${rangeToggle}</div></div>${trendGraphSvg(trend,label,stats,isPain)}${trend.length?`<div class="insight-stat-row"><div class="insight-stat"><div class="insight-stat-val">${stats.avgText}</div><div class="insight-stat-lbl">Average</div></div><div class="insight-stat"><div class="insight-stat-val ${stats.trendClass}">${stats.trendText}</div><div class="insight-stat-lbl">Trend direction</div></div><div class="insight-stat"><div class="insight-stat-val">${trend.length}</div><div class="insight-stat-lbl">${countLabel}</div></div></div>`:''}</div><div class="panel"><div class="panel-title">Estimated Pain-Med Effectiveness</div><div class="muted">Average pain change from the nearest pain reading before a PRN med to the nearest pain reading afterward. Positive means pain went down. This is an estimate, not medical proof.</div><div class="effect-list">${effectivenessRows(insightsRange)}</div></div>`
}
function trendStats(points,label,isPain){
  if(!points.length)return{avgText:'—',trendText:'—',trendClass:'trend-flat'};
  const avg=points.reduce((a,p)=>a+p.y,0)/points.length;
  let trend=0;
  if(points.length>=2){
    const n=points.length;
    const xs=points.map((p,i)=>i);
    const ys=points.map(p=>p.y);
    const mx=xs.reduce((a,b)=>a+b,0)/n,my=ys.reduce((a,b)=>a+b,0)/n;
    const den=xs.reduce((a,x)=>a+(x-mx)*(x-mx),0)||1;
    const slope=xs.reduce((a,x,i)=>a+(x-mx)*(ys[i]-my),0)/den;
    trend=slope*(n-1);
  }
  const dec=isPain?1:(points.some(p=>Math.abs(p.y-Math.round(p.y))>.001)?1:0);
  return{avgText:avg.toFixed(dec),trendText:`${trend>=0?'+':''}${trend.toFixed(dec)}`,trendClass:trend<0?'trend-down':(trend>0?'trend-up':'trend-flat')}
}
function trendGraphSvg(points,label,stats,isPain){
  if(!points.length)return`<div class="empty"><div class="empty-title">No ${esc(label)} data in this range</div></div>`;
  const w=640,h=250,padL=46,padR=18,padT=28,padB=38;
  const xs=points.map(p=>p.x),ys=points.map(p=>p.y);
  let minX=Math.min(...xs),maxX=Math.max(...xs);if(minX===maxX){minX-=1;maxX+=1}
  let minY=Math.min(...ys),maxY=Math.max(...ys);
  if(isPain){minY=0;maxY=10}else{minY=0;maxY=Math.max(1,maxY*1.15)}
  const xScale=x=>padL+(x-minX)/(maxX-minX)*(w-padL-padR);
  const yScale=y=>h-padB-(y-minY)/(maxY-minY)*(h-padT-padB);
  const pts=points.map(p=>`${xScale(p.x).toFixed(1)},${yScale(p.y).toFixed(1)}`).join(' ');
  const ticks=isPain?[0,2.5,5,7.5,10]:Array.from({length:5},(_,i)=>minY+(maxY-minY)*i/4);
  const title=isPain?`${esc(label)} trend`:`${esc(label)} daily total`;

  let trendLine='';
  if(points.length>=2){
    const n=points.length;
    const idx=points.map((_,i)=>i);
    const yVals=points.map(p=>Number(p.y));
    const mx=idx.reduce((a,b)=>a+b,0)/n;
    const my=yVals.reduce((a,b)=>a+b,0)/n;
    const den=idx.reduce((a,x)=>a+(x-mx)*(x-mx),0)||1;
    const slope=idx.reduce((a,x,i)=>a+(x-mx)*(yVals[i]-my),0)/den;
    const intercept=my-slope*mx;
    const yA=Math.max(minY,Math.min(maxY,intercept));
    const yB=Math.max(minY,Math.min(maxY,intercept+slope*(n-1)));
    trendLine=`<line x1="${xScale(points[0].x).toFixed(1)}" y1="${yScale(yA).toFixed(1)}" x2="${xScale(points[n-1].x).toFixed(1)}" y2="${yScale(yB).toFixed(1)}" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="7 7" opacity=".42"/>`;
  }

  return`<svg class="graph" viewBox="0 0 ${w} ${h}"><rect x="0" y="0" width="${w}" height="${h}" fill="none"/>${ticks.map(t=>`<line x1="${padL}" y1="${yScale(t).toFixed(1)}" x2="${w-padR}" y2="${yScale(t).toFixed(1)}" stroke="currentColor" opacity=".10"/><text x="12" y="${(yScale(t)+4).toFixed(1)}" class="graph-label">${Number(t).toFixed(t%1?1:0)}</text>`).join('')}<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${h-padB}" stroke="currentColor" opacity=".20"/><line x1="${padL}" y1="${h-padB}" x2="${w-padR}" y2="${h-padB}" stroke="currentColor" opacity=".20"/>${trendLine}<polyline points="${pts}" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><g>${points.map(p=>`<circle cx="${xScale(p.x).toFixed(1)}" cy="${yScale(p.y).toFixed(1)}" r="4" fill="currentColor"/>`).join('')}</g><text x="${padL}" y="20" class="graph-label">${title}</text><text x="${w-padR}" y="20" text-anchor="end" class="graph-label">Avg ${stats.avgText} · Trend ${stats.trendText}</text><text x="${padL}" y="${h-10}" class="graph-label">${new Date(minX).toLocaleDateString()}</text><text x="${w-padR}" y="${h-10}" text-anchor="end" class="graph-label">${new Date(maxX).toLocaleDateString()}</text></svg>`
}

function effectivenessRows(range){const painLogs=painLogsInRange(range);if(painLogs.length<2)return`<div class="empty"><div class="empty-title">Not enough pain data</div><div>Log pain before and after pain medication to estimate effectiveness.</div></div>`;const start=rangeStart(range);const candidates=meds.filter(m=>!m.archived&&!m.is_pain&&activeGroups(m).includes('prn'));const rows=[];for(const med of candidates){const medEntries=logs.filter(l=>l.medication_id===med.id&&l.loggedTime>=start).sort((a,b)=>a.loggedTime-b.loggedTime);const changes=[];for(const dose of medEntries){const before=[...painLogs].reverse().find(p=>p.loggedTime<dose.loggedTime&&dose.loggedTime-p.loggedTime<=4*3600000);const after=painLogs.find(p=>p.loggedTime>dose.loggedTime+20*60000&&p.loggedTime-dose.loggedTime<=8*3600000);if(before&&after&&Number.isFinite(before.dose)&&Number.isFinite(after.dose))changes.push(Number(before.dose)-Number(after.dose))}if(changes.length){const avg=changes.reduce((a,b)=>a+b,0)/changes.length;rows.push({med,avg,n:changes.length})}}if(!rows.length)return`<div class="empty"><div class="empty-title">No matched pain-med pairs yet</div><div>For this to work, log pain shortly before and after PRN pain meds.</div></div>`;rows.sort((a,b)=>b.avg-a.avg);return rows.map(r=>`<div class="effect-row"><div><div class="med-name">${esc(r.med.brand)}</div><div class="med-sub">${r.n} matched dose${r.n===1?'':'s'}</div></div><div class="effect-score">${r.avg>=0?'+':''}${r.avg.toFixed(1)}</div></div>`).join('')}
function overrideButtonLabel(av){if(av.kind==='countdown')return `Override and Log - ${waitText(av.earlyMs||0)} early`;if(av.kind==='blocked')return `Override and Log - Conflict with ${av.conflictMed||'medication'}`;return 'Override and Log'}
function openLogSheet(id,group){const med=getMed(id);if(!med)return;const av=availability(med,group);if(med.archived){toast('Archived medications cannot be logged');return}const dose=currentDose(med);const opts=med.is_pain?Array.from({length:21},(_,i)=>i/2):doseOptions(med);let body='';const taper=med.is_pack?packDisplayNote(med):'';if(taper)body+=`<div class="taper-card"><div><div class="muted">Taper status</div><div style="font-weight:850">${esc(taper)}</div></div><div class="taper-week">${esc(packPosition(med)?.totalDays?`Day ${packPosition(med).day}`:`Step ${packPosition(med)?.index||''}`)}</div></div>`;if(med.note)body+=`<div class="info"><div class="info-label">Note</div><div class="info-val">${esc(med.note)}</div></div>`;if(!av.ok)body+=`<div class="warn-card">${esc(av.detail)}${av.needsOverride?'<br>Use override only if you intentionally want to bypass this restriction.':''}</div>`;if(med.is_pain){body+=`<div class="field"><label>Pain level</label><select class="select" id="log-dose">${opts.map(o=>`<option value="${o}">${o.toFixed(1)}/10</option>`).join('')}</select></div>`}else{body+=`<div class="field"><label>Dose</label><div class="chips">${opts.map(o=>`<button class="chip ${Number(o)===Number(dose)?'sel':''}" onclick="selectDose(this,'${o}')">${fmtDose(o,med.dose_unit)}</button>`).join('')}${med.has_custom!==false?`<button class="chip" onclick="showCustomDose(this)">Custom</button>`:''}</div><input type="hidden" id="log-dose" value="${esc(dose)}"><div class="custom-dose-row" id="custom-dose-row"><input class="input" type="number" step="any" id="custom-dose-input" placeholder="Custom dose (${esc(med.dose_unit||'')})" oninput="qs('log-dose').value=this.value"></div><div class="muted" style="font-size:13px">Unit: ${esc(med.dose_unit||'none')}</div></div>`}if(av.needsOverride){body+=`<button class="btn orange" onclick="saveDose('${med.id}','${group}',true)">${esc(overrideButtonLabel(av))}</button>`}else if(av.ok){body+=`<button class="btn green" onclick="saveDose('${med.id}','${group}',false)">Log Dose</button>`}body+=`<button class="btn gray" onclick="closeSheet()">Cancel</button>`;openSheet(med.brand,med.generic||'',body)}
function selectDose(btn,val){document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));btn.classList.add('sel');qs('log-dose').value=val;qs('custom-dose-row')?.classList.remove('show')}
function showCustomDose(btn){document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));btn.classList.add('sel');qs('custom-dose-row').classList.add('show');qs('custom-dose-input').focus();qs('log-dose').value=qs('custom-dose-input').value||''}
async function saveDose(id,group,override){const med=getMed(id);if(!med||med.archived)return toast('Cannot log archived medication');const av=availability(med,group);if(!override&&av.needsOverride)return toast('Use override to log this dose.');if(!override&&!av.ok)return toast(av.detail||'Not ready yet');const dose=Number(qs('log-dose')?.value);if(!Number.isFinite(dose)||dose<0)return toast('Enter a valid dose');try{await supa('POST','doses',{medication_id:id,medication_name:med.brand,dose,time:Date.now(),dose_unit:med.dose_unit||'',schedule_group:group,group_context:group,override:!!override});toast('Logged');closeSheet();await loadAll()}catch(e){toast('Log failed: '+e.message.slice(0,130))}}
function openMedEditor(id){const med=id?getMed(id):null;const isNew=!med;const m=med||{brand:'',generic:'',emoji:'💊',color:'blue',dose_unit:'mg',default_dose:null,dose_options:[],interval_hours:0,tablet_mg:null,note:'',schedule_groups:['prn'],archived:false,is_pack:false,is_pain:false};let body=`<div class="form-grid"><div class="field"><label>Brand / Name</label><input class="input" id="med-brand" value="${esc(m.brand||'')}"></div><div class="field"><label>Generic</label><input class="input" id="med-generic" value="${esc(m.generic||'')}"></div><div class="field"><label>Default dose</label><input class="input" type="number" step="any" id="med-default-dose" value="${esc(m.default_dose??'')}"></div><div class="field"><label>Dose unit</label><input class="input" id="med-dose-unit" value="${esc(m.dose_unit||'')}"></div><div class="field"><label>Dose options</label><input class="input" id="med-dose-options" value="${esc(doseOptions(m).join(','))}"></div><div class="field"><label>Interval hours</label><input class="input" type="number" step="any" id="med-interval" value="${esc(m.interval_hours||0)}"></div><div class="field"><label>Tablet mg</label><input class="input" type="number" step="any" id="med-tablet" value="${esc(m.tablet_mg??'')}"></div><div class="field"><label>Color</label><select class="select" id="med-color">${['blue','green','orange','yellow','purple','teal','red'].map(c=>`<option value="${c}" ${m.color===c?'selected':''}>${c}</option>`).join('')}</select></div></div><div class="field"><label>Emoji</label><input class="input" id="med-emoji" value="${esc(m.emoji||'💊')}"></div><div class="field"><label>Schedule groups</label><div class="checks">${Object.keys(SCHEDULE_GROUPS).map(g=>`<label class="check"><input type="checkbox" class="sched-check" value="${g}" ${activeGroups(m).includes(g)?'checked':''}>${SCHEDULE_GROUPS[g]}</label>`).join('')}</div></div><div class="field"><label>Note</label><textarea class="textarea" id="med-note">${esc(m.note||'')}</textarea></div><div class="checks"><label class="check"><input type="checkbox" id="med-is-pack" ${m.is_pack?'checked':''}>Pack / taper</label><label class="check"><input type="checkbox" id="med-is-pain" ${m.is_pain?'checked':''}>Pain level</label></div><button class="btn green" onclick="saveMed('${id||''}')">${isNew?'Create Medication':'Save Medication'}</button>`;if(!isNew){body+=`<div class="btn-row"><button class="btn blue" onclick="openPastDose('${id}')">Log Past Dose</button><button class="btn gray" onclick="openPackEditor('${id}')">Pack Steps</button></div><button class="btn gray" onclick="openConflictEditor('${id}')">Conflict Rules</button>${m.archived?`<button class="btn blue" onclick="setArchived('${id}',false)">Unarchive</button>`:`<button class="btn red" onclick="setArchived('${id}',true)">Archive</button>`}<div class="danger-note">Archive keeps history, leaves it visible in Settings, and removes it from Tracker/logging.</div>`}body+=`<button class="btn gray" onclick="closeSheet()">Close</button>`;openSheet(isNew?'Add Medication':'Medication Settings',m.brand||'',body)}
async function saveMed(id){const groups=[...document.querySelectorAll('.sched-check:checked')].map(x=>x.value);const doseOptionsVal=(qs('med-dose-options').value||'').split(',').map(x=>Number(x.trim())).filter(Number.isFinite);const payload={brand:qs('med-brand').value.trim(),generic:qs('med-generic').value.trim(),emoji:qs('med-emoji').value.trim()||'💊',color:qs('med-color').value,dose_unit:qs('med-dose-unit').value.trim(),default_dose:toNum(qs('med-default-dose').value),dose_options:doseOptionsVal,interval_hours:toNum(qs('med-interval').value)||0,tablet_mg:toNum(qs('med-tablet').value),note:qs('med-note').value.trim(),schedule_groups:groups.length?groups:['prn'],is_pack:qs('med-is-pack').checked,is_pain:qs('med-is-pain').checked};if(!payload.brand)return toast('Name is required');try{if(id)await supa('PATCH',`medications?id=eq.${id}`,payload);else await supa('POST','medications',payload);toast(id?'Medication saved':'Medication created');closeSheet();await loadAll()}catch(e){toast('Save failed: '+e.message.slice(0,130))}}
async function setArchived(id,val){try{await supa('PATCH',`medications?id=eq.${id}`,{archived:val});toast(val?'Archived':'Unarchived');closeSheet();await loadAll()}catch(e){toast('Archive failed: '+e.message.slice(0,120))}}
function openPastDose(id){const med=getMed(id);if(!med)return;if(med.archived)return toast('Archived meds cannot be logged');const nowLocal=new Date(Date.now()-new Date().getTimezoneOffset()*60000).toISOString().slice(0,16);openSheet('Log Past Dose',med.brand,`<div class="field"><label>Date and time</label><input class="input" type="datetime-local" id="past-time" value="${nowLocal}"></div><div class="field"><label>Schedule group</label><select class="select" id="past-group">${['manual',...activeGroups(med)].map(g=>`<option value="${g}">${SCHEDULE_GROUPS[g]||g}</option>`).join('')}</select></div><div class="field"><label>Dose (${esc(med.dose_unit||'')})</label><input class="input" type="number" step="any" id="past-dose" value="${esc(currentDose(med)||'')}"></div><button class="btn green" onclick="savePastDose('${id}')">Log Past Dose</button><button class="btn gray" onclick="openMedEditor('${id}')">Back</button>`)}
async function savePastDose(id){const med=getMed(id),dose=Number(qs('past-dose').value),timeVal=qs('past-time').value,group=qs('past-group').value;if(!med||med.archived)return toast('Cannot log archived medication');if(!timeVal||!Number.isFinite(dose))return toast('Enter time and dose');try{await supa('POST','doses',{medication_id:id,medication_name:med.brand,dose,time:new Date(timeVal).getTime(),dose_unit:med.dose_unit||'',schedule_group:group,group_context:group});toast('Past dose logged');closeSheet();await loadAll()}catch(e){toast('Past log failed: '+e.message.slice(0,130))}}
function openPackEditor(id){const med=getMed(id),steps=packFor(med);let body=`<div class="mini-card"><div class="muted">Each row is a taper step. Duration is in days.</div></div><div id="pack-list">${steps.map((s,i)=>packStepRow(s,i)).join('')}</div><button class="btn blue" onclick="addPackStepRow()">+ Add Step</button><button class="btn green" onclick="savePackSteps('${id}')">Save Pack Steps</button><button class="btn gray" onclick="openMedEditor('${id}')">Back</button>`;openSheet('Pack Steps',med.brand,body)}
function packStepRow(s={},i){return`<div class="mini-card pack-step"><div class="form-grid"><div class="field"><label>Order</label><input class="input pack-order" type="number" value="${esc(s.sequence_order??i+1)}"></div><div class="field"><label>Dose</label><input class="input pack-dose" type="number" step="any" value="${esc(s.dose??'')}"></div><div class="field"><label>Duration days</label><input class="input pack-days" type="number" step="1" value="${esc(s.duration_days??'')}"></div><div class="field"><label>Doses/day</label><input class="input pack-daily" type="number" step="1" value="${esc(s.doses_per_day??'')}"></div><div class="field" style="grid-column:1/-1"><label>Step note</label><input class="input pack-note" value="${esc(s.note??'')}"></div><div class="field"><label>&nbsp;</label><button class="btn small red" onclick="this.closest('.pack-step').remove()">Remove</button></div></div></div>`}
function addPackStepRow(){qs('pack-list').insertAdjacentHTML('beforeend',packStepRow({},document.querySelectorAll('.pack-step').length))}
async function savePackSteps(id){const rows=[...document.querySelectorAll('.pack-step')].map(r=>({medication_id:id,sequence_order:Number(r.querySelector('.pack-order').value),dose:Number(r.querySelector('.pack-dose').value),duration_days:Number(r.querySelector('.pack-days').value),doses_per_day:toNum(r.querySelector('.pack-daily').value),note:r.querySelector('.pack-note').value.trim()})).filter(x=>Number.isFinite(x.sequence_order)&&Number.isFinite(x.dose)&&Number.isFinite(x.duration_days));try{await supa('DELETE',`medication_pack_steps?medication_id=eq.${id}`);for(const row of rows)await supa('POST','medication_pack_steps',row);await supa('PATCH',`medications?id=eq.${id}`,{is_pack:rows.length>0});toast('Pack saved');closeSheet();await loadAll()}catch(e){toast('Pack save failed: '+e.message.slice(0,130))}}
function openConflictEditor(id){const med=getMed(id);const own=conflictRulesFor(id);let body=`<div class="mini-card"><div class="muted">Conflict rules are stored both directions.</div></div><div class="field"><label>Other medication</label><select class="select" id="conf-other">${meds.filter(m=>m.id!==id).map(m=>`<option value="${m.id}">${esc(m.brand)}</option>`).join('')}</select></div><div class="field"><label>Window hours</label><input class="input" id="conf-hours" type="number" step="any" value="2"></div><button class="btn blue" onclick="addConflictRule('${id}')">+ Add Conflict</button><div class="section"><div class="section-head"><div class="section-title">Existing Rules</div></div><div class="section-body">${own.length?own.map(c=>conflictRow(c,id)).join(''):`<div class="empty"><div class="empty-title">No rules</div></div>`}</div></div><button class="btn gray" onclick="openMedEditor('${id}')">Back</button>`;openSheet('Conflict Rules',med.brand,body)}
function conflictRow(c,id){const other=getMed(c.med_b);return`<div class="row"><div class="med-text"><div class="med-name">${esc(other?.brand||'Unknown')}</div><div class="med-sub">${Number(c.window_hours)} hour window</div></div><button class="btn small red" onclick="removeConflictRule('${id}','${c.med_b}')">Remove</button></div>`}
async function addConflictRule(id){const other=qs('conf-other').value,hours=Number(qs('conf-hours').value);if(!other||!Number.isFinite(hours)||hours<=0)return toast('Choose med and hours');try{await supa('POST','medication_conflicts',{med_a:id,med_b:other,window_hours:hours});toast('Conflict added');await loadAll();openConflictEditor(id)}catch(e){toast('Conflict add failed: '+e.message.slice(0,130))}}
async function removeConflictRule(a,b){try{await supa('DELETE',`medication_conflicts?or=(and(med_a.eq.${a},med_b.eq.${b}),and(med_a.eq.${b},med_b.eq.${a}))`);toast('Conflict removed');await loadAll();openConflictEditor(a)}catch(e){toast('Remove failed: '+e.message.slice(0,130))}}
applyTheme(currentTheme);loadAll();setInterval(()=>{if(currentTab==='tracker')renderTracker()},60000);
</script>
