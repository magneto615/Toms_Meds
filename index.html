<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<title>Tom's Meds</title>
<style>
  :root {
    --ios-bg:#000000;--ios-bg2:#1c1c1e;--ios-bg3:#2c2c2e;--ios-bg4:#3a3a3c;
    --ios-sep:rgba(255,255,255,0.08);
    --ios-lbl:#ffffff;--ios-lbl2:rgba(255,255,255,0.55);--ios-lbl3:rgba(255,255,255,0.30);
    --ios-blue:#0a84ff;--ios-green:#30d158;--ios-red:#ff453a;--ios-orange:#ff9f0a;
    --ios-purple:#bf5af2;--ios-teal:#5ac8fa;--ios-yellow:#ffd60a;
    --ios-fill:rgba(255,255,255,0.08);--ios-fill2:rgba(255,255,255,0.12);
    --r-lg:16px;--r-md:12px;--r-sm:10px;--tab-h:83px;
    --sf:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--ios-bg);color:var(--ios-lbl);font-family:var(--sf);font-size:17px;line-height:1.3;min-height:100dvh;-webkit-font-smoothing:antialiased}

  .nav-bar{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(28,28,30,0.85);backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);border-bottom:0.5px solid var(--ios-sep);padding-top:env(safe-area-inset-top,44px)}
  .nav-title-bar{display:flex;align-items:center;justify-content:center;height:44px;position:relative;padding:0 16px}
  .nav-title{font-size:17px;font-weight:600;letter-spacing:-0.4px}
  .nav-right{position:absolute;right:16px;top:50%;transform:translateY(-50%)}
  .sync-indicator{font-size:12px;color:var(--ios-lbl3);display:flex;align-items:center;gap:5px}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ios-lbl3);flex-shrink:0;transition:background 0.3s}
  .sync-dot.green{background:var(--ios-green)}.sync-dot.orange{background:var(--ios-orange)}.sync-dot.red{background:var(--ios-red)}

  .tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(28,28,30,0.92);backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);border-top:0.5px solid var(--ios-sep);padding-bottom:env(safe-area-inset-bottom,20px);display:flex}
  .tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 2px;cursor:pointer;border:none;background:none;color:var(--ios-lbl3);font-family:var(--sf);transition:color 0.15s;min-height:49px}

  .tab-icon{font-size:22px;line-height:1;margin-bottom:2px}
  .tab-label{font-size:10px;font-weight:500;letter-spacing:0.1px}

  .scroll-content{padding-top:calc(env(safe-area-inset-top,44px) + 44px);padding-bottom:calc(env(safe-area-inset-bottom,20px) + var(--tab-h));min-height:100dvh}
  .page{display:none}.page.active{display:block}

  .list-header{font-size:13px;font-weight:400;color:var(--ios-lbl2);text-transform:uppercase;letter-spacing:0.06em;padding:0 16px 6px}

  .med-icon.purple{background:rgba(191,90,242,0.18)}.med-icon.teal{background:rgba(90,200,250,0.18)}
  .med-icon.red{background:rgba(255,69,58,0.18)}

  .med-text{flex:1;min-width:0}

  .med-sub{font-size:12px;color:var(--ios-lbl3);margin-top:2px}
  .med-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .status-pill{font-size:13px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap}
  .pill-ok{background:rgba(48,209,88,0.18);color:var(--ios-green)}
  .pill-wait{background:rgba(255,69,58,0.18);color:var(--ios-red)}
  .pill-warn{background:rgba(255,159,10,0.18);color:var(--ios-orange)}

  .prog-track{height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:5px;overflow:hidden}
  .prog-fill{height:100%;border-radius:2px;background:var(--ios-green);transition:width 1s linear}
  .prog-fill.mid{background:var(--ios-orange)}.prog-fill.low{background:var(--ios-red)}

  .sheet-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.5)}
  .sheet-overlay.show{display:block}
  .sheet{position:fixed;bottom:0;left:0;right:0;z-index:301;background:var(--ios-bg2);border-radius:20px 20px 0 0;padding-bottom:env(safe-area-inset-bottom,20px);transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .sheet.show{transform:translateY(0)}
  .sheet-handle{width:36px;height:5px;border-radius:3px;background:rgba(255,255,255,0.25);margin:10px auto 0}
  .sheet-header{padding:14px 20px 0;display:flex;align-items:flex-start;justify-content:space-between}
  .sheet-title{font-size:20px;font-weight:700;letter-spacing:-0.4px}
  .sheet-subtitle{font-size:14px;color:var(--ios-lbl2);margin-top:2px}
  .sheet-close{width:30px;height:30px;border-radius:50%;background:var(--ios-fill2);border:none;color:var(--ios-lbl2);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}

  .last-val{font-size:15px;font-weight:500}
  .last-sub{font-size:13px;color:var(--ios-lbl2);margin-top:2px}

  .dose-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .dose-chip{padding:8px 18px;border-radius:20px;border:1.5px solid var(--ios-bg4);background:var(--ios-bg3);color:var(--ios-lbl2);font-family:var(--sf);font-size:15px;font-weight:500;cursor:pointer;transition:all 0.15s}
  .dose-chip.sel{background:var(--ios-blue);border-color:var(--ios-blue);color:#fff}

  .custom-row{display:flex;gap:10px;align-items:center;margin-bottom:14px}

  .custom-unit{font-size:15px;color:var(--ios-lbl2)}

  .action-btn{width:100%;padding:15px;border-radius:var(--r-md);border:none;font-family:var(--sf);font-size:17px;font-weight:600;cursor:pointer;transition:opacity 0.15s,transform 0.1s;margin-bottom:10px;letter-spacing:-0.2px}

  .btn-green{background:var(--ios-green);color:#000}
  .btn-disabled{background:var(--ios-bg3);color:var(--ios-lbl3);cursor:not-allowed}
  .btn-red{background:rgba(255,69,58,0.15);color:var(--ios-red);border:1.5px solid rgba(255,69,58,0.3)}
  .btn-orange{background:var(--ios-orange);color:#000}
  .btn-teal{background:rgba(90,200,250,0.18);color:var(--ios-teal);border:1.5px solid rgba(90,200,250,0.3)}

  .past-inner{background:var(--ios-bg3);border-radius:var(--r-md);padding:14px;margin-bottom:12px}
  .past-lbl{font-size:13px;color:var(--ios-lbl2);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em}
  .past-datetime{width:100%;background:var(--ios-bg4);border:none;border-radius:var(--r-sm);color:var(--ios-lbl);font-family:var(--sf);font-size:15px;padding:10px 12px}

  .alert-card{margin:0 0 14px;background:rgba(255,159,10,0.15);border:1px solid rgba(255,159,10,0.35);border-radius:var(--r-lg);padding:14px 16px}

  .alert-body{font-size:13px;color:var(--ios-lbl2);line-height:1.45;white-space:pre-line}

  .hist-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .hist-del{background:none;border:none;color:var(--ios-lbl3);font-size:18px;cursor:pointer;padding:2px 4px;flex-shrink:0;line-height:1;transition:color 0.15s}
  .hist-del:active{color:var(--ios-red)}

  .sync-bar{margin:0 16px 16px;background:var(--ios-bg2);border-radius:var(--r-lg);padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
  .sync-bar-label{font-size:14px;color:var(--ios-lbl2)}
  .sync-bar-result{font-size:13px;color:var(--ios-lbl3)}

  .empty{text-align:center;padding:60px 30px;color:var(--ios-lbl2);font-size:15px;line-height:1.5}
  .empty-icon{font-size:48px;margin-bottom:14px}
  .empty-title{font-size:20px;font-weight:600;color:var(--ios-lbl);margin-bottom:8px}

  .copy-btn{display:block;width:calc(100% - 32px);margin:0 16px 20px;padding:15px;border-radius:var(--r-md);border:none;background:var(--ios-fill);color:var(--ios-blue);font-family:var(--sf);font-size:17px;font-weight:600;cursor:pointer;text-align:center;transition:opacity 0.15s}

  .confirm-overlay{display:none;position:fixed;inset:0;z-index:399;background:rgba(0,0,0,0.5)}

  .confirm-sheet{position:fixed;bottom:0;left:0;right:0;z-index:400;padding:0 8px calc(env(safe-area-inset-bottom,20px) + 8px);transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1)}
  .confirm-sheet.show{transform:translateY(0)}
  .confirm-inner{background:var(--ios-bg2);border-radius:var(--r-lg);overflow:hidden;margin-bottom:8px}
  .confirm-title-row{padding:14px 16px 10px;text-align:center}
  .confirm-title{font-size:13px;font-weight:600}
  .confirm-msg{font-size:13px;color:var(--ios-lbl2);margin-top:4px;line-height:1.4;white-space:pre-line}
  .confirm-divider{height:0.5px;background:var(--ios-sep)}
  .confirm-act{width:100%;padding:14px;border:none;background:none;font-family:var(--sf);font-size:17px;cursor:pointer;text-align:center;transition:background 0.1s}
  .confirm-act:active{background:var(--ios-fill)}
  .confirm-act.destr{color:var(--ios-red)}.confirm-act.prim{color:var(--ios-blue);font-weight:600}
  .confirm-cancel{width:100%;padding:14px;border:none;background:var(--ios-bg2);border-radius:var(--r-lg);font-family:var(--sf);font-size:17px;font-weight:600;color:var(--ios-blue);cursor:pointer}
  .confirm-cancel:active{background:var(--ios-bg3)}

  .toast{position:fixed;z-index:500;top:calc(env(safe-area-inset-top,44px) + 60px);left:16px;right:16px;background:rgba(44,44,46,0.97);border-radius:var(--r-md);padding:13px 16px;font-size:15px;font-weight:500;display:flex;align-items:center;gap:10px;backdrop-filter:blur(20px);box-shadow:0 4px 24px rgba(0,0,0,0.4);transform:translateY(-20px);opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none}
  .toast.show{transform:translateY(0);opacity:1}
  .toast-icon{font-size:20px;flex-shrink:0}

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

  .pack-day-block{background:var(--ios-bg3);border-radius:var(--r-md);padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
  .pack-day-label{font-size:13px;color:var(--ios-lbl2)}
  .pack-day-value{font-size:20px;font-weight:700;color:var(--ios-purple)}

  .pain-picker-wrap{margin-bottom:14px}
  .pain-picker{
    width:100%;
    height:48px;
    background:var(--ios-bg3);
    border:1.5px solid var(--ios-bg4);
    border-radius:var(--r-md);
    color:var(--ios-lbl);
    font-family:var(--sf);
    font-size:16px;
    padding:0 12px;
  }
  .pain-picker:focus{outline:none;border-color:var(--ios-blue)}
  .pain-picker.placeholder{color:var(--ios-lbl3)}

  .filter-bar{position:relative;margin:0 16px 16px}
  .filter-button{
    width:100%;display:flex;align-items:center;justify-content:space-between;
    background:var(--ios-bg2);border:1px solid var(--ios-sep);border-radius:var(--r-lg);
    padding:14px 16px;color:var(--ios-lbl);font-family:var(--sf);font-size:16px;cursor:pointer
  }
  .filter-button-label{font-weight:500}
  .filter-button-sub{font-size:13px;color:var(--ios-lbl2)}
  .filter-menu{
    display:none;position:absolute;top:calc(100% + 8px);left:0;right:0;z-index:210;
    background:rgba(28,28,30,0.98);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid var(--ios-sep);border-radius:var(--r-lg);overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.35)
  }
  .filter-menu.show{display:block}
  .filter-menu-head{padding:12px 16px;border-bottom:0.5px solid var(--ios-sep);display:flex;align-items:center;justify-content:space-between}
  .filter-menu-title{font-size:13px;color:var(--ios-lbl2);text-transform:uppercase;letter-spacing:0.06em}
  .filter-clear-btn{background:none;border:none;color:var(--ios-blue);font-family:var(--sf);font-size:14px;cursor:pointer}
  .filter-list{max-height:320px;overflow-y:auto}
  .filter-item{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;position:relative}
  .filter-item:not(:last-child)::after{content:'';position:absolute;left:16px;right:0;bottom:0;height:0.5px;background:var(--ios-sep)}
  .filter-item:active{background:var(--ios-fill)}
  .filter-item-left{display:flex;align-items:center;gap:10px;min-width:0}
  .filter-item-label{font-size:16px}
  .checkmark{font-size:16px;color:var(--ios-blue);min-width:16px;text-align:center}
  .filter-backdrop{display:none;position:fixed;inset:0;z-index:205}
  .filter-backdrop.show{display:block}

  .segmented{display:inline-flex;background:var(--ios-bg3);border-radius:10px;padding:2px}
  .seg-btn{
    min-width:60px;padding:8px 12px;border:none;background:transparent;color:var(--ios-lbl2);
    font-family:var(--sf);font-size:14px;font-weight:600;border-radius:8px;cursor:pointer
  }
  .seg-btn.active{background:var(--ios-fill2);color:var(--ios-lbl)}

  .insight-wrap{margin:0 16px 20px}
  .insight-card{
    background:var(--ios-bg2);border-radius:var(--r-lg);padding:16px;margin-bottom:16px
  }
  .insight-title{font-size:18px;font-weight:700;letter-spacing:-0.3px}
  .insight-sub{font-size:13px;color:var(--ios-lbl2);margin-top:4px}
  .insight-grid{
    display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:14px
  }
  .metric{
    background:var(--ios-bg3);border-radius:12px;padding:12px
  }
  .metric-lbl{font-size:12px;color:var(--ios-lbl2);text-transform:uppercase;letter-spacing:0.05em}
  .metric-val{font-size:20px;font-weight:700;margin-top:5px}
  .metric-sub{font-size:12px;color:var(--ios-lbl2);margin-top:4px}
  .trend-good{color:var(--ios-green)} .trend-mid{color:var(--ios-yellow)} .trend-bad{color:var(--ios-red)}

  .graph-wrap{margin-top:14px}
  .graph-svg{
    width:100%;height:auto;display:block;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));

  }
  .graph-axis-label{font-size:11px;fill:rgba(255,255,255,0.45);font-family:var(--sf)}
  .graph-grid{stroke:rgba(255,255,255,0.08);stroke-width:1}
  .graph-line{fill:none;stroke:rgba(90,200,250,0.8);stroke-width:2.5}
</style>
</head>

<div class="nav-bar">
  <div class="nav-title-bar">
    <div class="nav-title">Tom's Medications</div>

      <button onclick="manualRefresh()" style="background:none;border:none;color:var(--ios-blue);font-family:var(--sf);font-size:15px;font-weight:500;cursor:pointer;padding:4px 0">Refresh</button>

      <div class="sync-indicator">

<div class="tab-bar">

<div class="filter-backdrop" id="filter-backdrop" onclick="closeFilterMenu()"></div>

<div class="toast" id="toast">

</div>

async function supaFetch(method, path, body) {
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
    method,
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': `Bearer ${SUPA_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method==='POST' ? 'return=representation' : ''
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
  return method==='DELETE' ? null : res.json();
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function getMed(medId) { return MEDS.find(m=>m.id===medId); }

function getState(medId) {
  if (!medState[medId]) {
    const med = getMed(medId);
    medState[medId] = {
      selectedDose: med.isPain ? null : med.defaultDose,
      useCustom:false,
      customVal:'',
      pastVal:''
    };
  }
  return medState[medId];
}

function saveLogs() { localStorage.setItem('tomMedLogs_v2', JSON.stringify(logs)); }

function pillCount(med, dose) {
  if (!med.tabletMg || med.doseUnit==='tablet' || med.doseUnit==='units' || med.doseUnit==='tabs' || med.doseUnit==='g' || med.isPain) return '';
  const n = dose / med.tabletMg;
  const nice = n===Math.floor(n) ? n : parseFloat(n.toFixed(2));
  return ` · ${nice} ${nice===1?'tab':'tabs'}`;
}

function fmtDoseDecimal(n) { return Number(n).toFixed(1); }
function formatPainValue(n) { return `${fmtDoseDecimal(n)}/10`; }
function formatDoseDisplay(med, dose) {
  if (med.isPain) return formatPainValue(dose);
  return `${dose}${med.doseUnit}${pillCount(med,dose)}`;
}

function getMedrolPackDay() {
  const pl = logs.filter(l=>l.medId==='medrol').sort((a,b)=>a.time-b.time);
  return Math.min(pl.length + 1, 6);
}
function getMedrolDayDose(day) { return [6,5,4,3,2,1][Math.min(day-1,5)]; }

function getLastLog(medId) {
  const ml = logs.filter(l=>l.medId===medId);
  return ml.length ? ml.reduce((a,b)=>a.time>b.time?a:b) : null;
}

function getLastWithinMs(medId, ms) {
  const cutoff = Date.now() - ms;
  const ml = logs.filter(l=>l.medId===medId && l.time >= cutoff).sort((a,b)=>b.time-a.time);
  return ml.length ? ml[0] : null;
}

function getAvailability(med) {
  if (med.isPain) return {ok:true,msLeft:0,reason:'none'};
  const last=getLastLog(med.id);
  if(!last) return {ok:true,msLeft:0,reason:'none'};
  const elapsed=Date.now()-last.time, iv=med.intervalHours*3600000;
  if (elapsed>=iv) return {ok:true,msLeft:0,reason:'none'};
  return {ok:false,msLeft:iv-elapsed,reason:'interval'};
}

function fmtWaitClock(ms) {
  const totalMinutes = Math.max(0, Math.ceil(ms/60000));
  const hours = Math.floor(totalMinutes / 60);
  const mins = totalMinutes % 60;
  return `${String(hours).padStart(2,'0')}:${String(mins).padStart(2,'0')}`;
}

function getConflictWarnings(med) {
  if (!med || med.isPain) return [];
  const twoHours = 2 * 3600000;
  const warnings = [];

  if (med.id === 'zanaflex') {
    const lastDilaudid = getLastWithinMs('dilaudid', twoHours);
    const lastXanax = getLastWithinMs('xanax', twoHours);

    if (lastDilaudid) {
      const clearTs = lastDilaudid.time + twoHours;
      warnings.push({
        otherMedId:'dilaudid',
        clearTs,
        message:`Cannot take Zanaflex within 2 hours of Dilaudid. Wait ${fmtWaitClock(clearTs - Date.now())}`
      });
    }
    if (lastXanax) {
      const clearTs = lastXanax.time + twoHours;
      warnings.push({
        otherMedId:'xanax',
        clearTs,
        message:`Cannot take Zanaflex within 2 hours of Xanax. Wait ${fmtWaitClock(clearTs - Date.now())}`
      });
    }
  }

  if (med.id === 'dilaudid') {
    const lastXanax = getLastWithinMs('xanax', twoHours);
    if (lastXanax) {
      const clearTs = lastXanax.time + twoHours;
      warnings.push({
        otherMedId:'xanax',
        clearTs,
        message:`Cannot take Dilaudid within 2 hours of Xanax. Wait ${fmtWaitClock(clearTs - Date.now())}`
      });
    }
  }

  if (med.id === 'xanax') {
    const lastDilaudid = getLastWithinMs('dilaudid', twoHours);
    if (lastDilaudid) {
      const clearTs = lastDilaudid.time + twoHours;
      warnings.push({
        otherMedId:'dilaudid',
        clearTs,
        message:`Cannot take Xanax within 2 hours of Dilaudid. Wait ${fmtWaitClock(clearTs - Date.now())}`
      });
    }
  }

  return warnings;
}

function canTake(med) {
  const availability = getAvailability(med);
  return {
    ...availability,
    warnings: getConflictWarnings(med)
  };
}

function getNextAvailableTs(med) {
  if (med.isPain) return null;
  const avail = getAvailability(med);
  const intervalTs = avail.ok ? Date.now() : Date.now() + avail.msLeft;
  const warningTs = getConflictWarnings(med).reduce((max, w) => Math.max(max, w.clearTs), 0);
  const nextTs = Math.max(intervalTs, warningTs || 0);
  return nextTs > Date.now() ? nextTs : null;
}

function getEffectiveDose(medId) {
  const med=getMed(medId), s=getState(medId);
  if (med.hasCustom && s.useCustom) {
    const v=parseFloat(s.customVal);
    return isNaN(v) ? s.selectedDose : v;
  }
  if (med.isPack) return getMedrolDayDose(getMedrolPackDay());
  return s.selectedDose;
}

function validateEffectiveDose(medId) {
  const med = getMed(medId);
  const dose = getEffectiveDose(medId);

  if (med.isPain) {
    if (dose === null || dose === undefined || isNaN(dose)) return {ok:false,msg:'Select a pain level'};
    if (dose < 0 || dose > 10) return {ok:false,msg:'Pain must be between 0 and 10'};
    if (Math.round(dose * 2) !== dose * 2) return {ok:false,msg:'Pain must use 0.5 increments'};
    return {ok:true};
  }

  if (isNaN(dose) || dose <= 0) return {ok:false,msg:'Enter a valid dose'};
  return {ok:true};
}

function getPainColor(val) {
  const clamped = Math.max(0, Math.min(10, Number(val)));
  const hue = 120 - (clamped * 12);
  return `hsl(${hue}, 68%, 58%)`;
}

function getHistoryFilterOrder() {
  const pain = MEDS.find(m=>m.id==='pain');
  const others = MEDS.filter(m=>m.id!=='pain').slice().sort((a,b)=>a.brand.localeCompare(b.brand));
  return pain ? [pain, ...others] : others;
}

function allFiltersSelected() {
  return activeFilters.size === MEDS.length && MEDS.every(m => activeFilters.has(m.id));
}

// ─── FORMAT ───────────────────────────────────────────────────────────────────
function fmtCountdown(ms) {
  const s=Math.ceil(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h>0) return `${h}h ${m}m`;
  if(m>0) return `${m}m ${sec}s`;
  return `${sec}s`;
}
function fmtTime(ts) { return new Date(ts).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}); }
function fmtDate(ts) {
  const d=new Date(ts),t=new Date(),y=new Date(t); y.setDate(t.getDate()-1);
  if(d.toDateString()===t.toDateString()) return 'Today';
  if(d.toDateString()===y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([],{weekday:'long',month:'short',day:'numeric'});
}
function fmtDateTime(ts) { return `${fmtDate(ts)} at ${fmtTime(ts)}`; }
function localDTVal(ts) {
  const d=new Date(ts),p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}

function setSyncStatus(status, label) {
  const dot=document.getElementById('sync-dot'), lbl=document.getElementById('sync-label');
  if(!dot) return;
  dot.className='sync-dot'+(status==='ok'?' green':status==='syncing'?' orange':status==='error'?' red':'');
  lbl.textContent=label||'';
}

// ─── SUPABASE OPS ─────────────────────────────────────────────────────────────
async function pushEntry(entry) {
  const med=getMed(entry.medId);
  try {
    setSyncStatus('syncing','Saving…');
    await supaFetch('POST', TABLE, {
      entry_id: String(entry.id),
      med_id:   entry.medId,
      med_brand:med?med.brand:entry.medId,
      time:     entry.time,
      dose:     entry.dose,
      unit:     entry.unit,
      past:     !!entry.past,
      override: !!entry.override
    });
    setSyncStatus('ok','Saved');
    setTimeout(()=>setSyncStatus('',''),2000);
  } catch(e) {
    console.warn('Supabase push failed:',e);
    setSyncStatus('error','Sync error');
    setTimeout(()=>setSyncStatus('',''),4000);
  }
}

async function deleteFromCloud(entryId) {
  try {
    setSyncStatus('syncing','Deleting…');
    await supaFetch('DELETE', `${TABLE}?entry_id=eq.${String(entryId)}`, null);
    setSyncStatus('ok','Deleted');
    setTimeout(()=>setSyncStatus('',''),2000);
  } catch(e) {
    console.warn('Supabase delete failed:',e);
    setSyncStatus('error','Delete error');
    setTimeout(()=>setSyncStatus('',''),4000);
  }
}

async function loadFromCloud() {
  try {
    setSyncStatus('syncing','Loading…');
    const rows=await supaFetch('GET',`${TABLE}?order=time.asc`,null);
    if(rows && rows.length>=0) {
      logs=rows.map(r=>({
        id: String(r.entry_id),
        medId: r.med_id,
        time: r.time,
        dose: r.dose,
        unit: r.unit,
        past: r.past,
        override: r.override
      }));
      saveLogs();
    }
    setSyncStatus('ok','Synced');
    setTimeout(()=>setSyncStatus('',''),2000);
    render();
  } catch(e) {
    console.warn('Supabase load failed:',e);
    setSyncStatus('error','Offline — local data');
    setTimeout(()=>setSyncStatus('',''),4000);
  }
}

async function checkSyncStatus() {
  const el=document.getElementById('sync-check-result'); if(!el) return;
  try {
    const rows=await supaFetch('GET',`${TABLE}?select=entry_id`,null);
    const cc=rows?rows.length:0, lc=logs.length;
    if(cc===lc){el.textContent=`✅ In sync (${cc} entries)`;el.style.color='var(--ios-green)';}
    else{el.textContent=`⚠️ Local: ${lc} · Cloud: ${cc}`;el.style.color='var(--ios-orange)';}
  } catch(e){el.textContent='📵 Offline — can\'t check';el.style.color='var(--ios-lbl3)';}
}

// ─── SHORTCUTS ────────────────────────────────────────────────────────────────
function launchShortcut(medId, type) {
  const med = getMed(medId);
  const nextTs = getNextAvailableTs(med);
  if (!nextTs) { showToast('✅', `${med.brand} is already available!`); return; }

  const nextDate = new Date(nextTs);
  const now = new Date();
  const isNextDay = nextDate.toDateString() !== now.toDateString();
  const timeStr = nextDate.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
  const displayTime = isNextDay ? `Tomorrow at ${timeStr}` : timeStr;

  const payload = JSON.stringify({
    med: med.brand,
    type: type,
    time: `${String(nextDate.getHours()).padStart(2,'0')}:${String(nextDate.getMinutes()).padStart(2,'0')}`,
    timeStr: timeStr,
    displayTime: displayTime,
    label: `${med.brand} — OK to take at ${displayTime}`
  });

  window.location.href = `shortcuts://run-shortcut?name=TomsMeds&input=text&text=${encodeURIComponent(payload)}`;
  showToast('🔔', `Opening Shortcuts for ${type}…`);
}

// ─── LOG / DELETE ─────────────────────────────────────────────────────────────
function resetPainSelection() {
  const s = getState('pain');
  s.selectedDose = null;
}

function logDose(medId, overrideTime, isPast, isOverride) {
  const med=getMed(medId);
  const valid = validateEffectiveDose(medId);
  if (!valid.ok) { showToast('⚠️', valid.msg); return; }

  const dose=getEffectiveDose(medId);
  const time=overrideTime||Date.now();
  const entry={id:String(Date.now()+Math.random()),medId,time,dose,unit:med.doseUnit,past:!!isPast,override:!!isOverride};

  logs.push(entry);
  saveLogs();
  pushEntry(entry);

  if (med.isPain) resetPainSelection();

  closeSheet();

  let msg='';
  if (med.isPain) {
    msg = isPast ? `Past pain — ${formatPainValue(dose)}` : `Pain logged — ${formatPainValue(dose)}`;
  } else if (isOverride) {
    msg = `Override — ${med.brand} ${formatDoseDisplay(med,dose)}`;
  } else if (isPast) {
    msg = `Past dose — ${med.brand} ${formatDoseDisplay(med,dose)}`;
  } else {
    msg = `${med.brand} ${formatDoseDisplay(med,dose)} logged`;
  }

  showToast(isOverride?'⚠️':isPast?'↩':'✓', msg);
  render();
}

function askDelete(logId) {
  const log=logs.find(l=>String(l.id)===String(logId));
  if(!log) return;
  const med=getMed(log.medId);
  const val = med?.isPain ? formatPainValue(log.dose) : formatDoseDisplay(med, log.dose);
  showConfirm(
    'Delete Entry?',
    `${med?med.brand:log.medId} — ${val}\n${fmtDateTime(log.time)}`,
    'Delete Entry', true,
    () => {
      logs=logs.filter(l=>String(l.id)!==String(logId));
      saveLogs();
      deleteFromCloud(logId);
      showToast('🗑','Entry deleted');
      render();
    }
  );
}

let toastTimer;

function setPainValuePast(val) {
  const s = getState('pain');

function buildDoseHtml(medId, isPastMode=false) {
  const med=getMed(medId), s=getState(medId);

  if (med.isPain) {
    let options = `<option value="" selected>${s.selectedDose == null ? 'Select your pain level' : 'Select your pain level'}</option>`;
    for (let i = 0; i <= 10; i += 0.5) {
      const val = i.toFixed(1);
      options += `<option value="${val}">${val}/10</option>`;
    }
    return `
      <div class="dose-lbl">Pain Level</div>
      <div class="pain-picker-wrap">
        <select id="pain-picker" class="pain-picker ${s.selectedDose==null?'placeholder':''}" onchange="${isPastMode ? `setPainValuePast(this.value)` : `setPainValue(this.value)`}">
          ${options}
        </select>
      </div>
    `;
  }

  let doseHtml='<div class="dose-lbl">Dose</div><div class="dose-chips" id="dose-chips-wrap">';
  med.doseOptions.forEach(d=>{
    const sel=!s.useCustom&&d===s.selectedDose;
    doseHtml+=`<button class="dose-chip ${sel?'sel':''}" onclick="${isPastMode ? `selectDosePast('${medId}',${d})` : `selectDose('${medId}',${d})`}">${d}${med.doseUnit}${pillCount(med,d)}</button>`;
  });
  if(med.hasCustom) doseHtml+=`<button class="dose-chip custom-chip ${s.useCustom?'sel':''}" id="custom-chip-btn" onclick="${isPastMode ? `activateCustomPast('${medId}')` : `activateCustom('${medId}')`}">Custom</button>`;
  doseHtml+='</div>';

  if(s.useCustom) {
    doseHtml+=`<div class="custom-row"><input class="custom-input" id="custom-dose-input" type="number" step="0.5" min="0.5" placeholder="Enter dose" value="${s.customVal}" oninput="${isPastMode ? `onCustomInputPast('${medId}',this.value)` : `onCustomInput('${medId}',this.value)`}"><span class="custom-unit">${med.doseUnit}</span></div>`;
  }

  return doseHtml;
}

function renderSheet(medId) {
  const med=getMed(medId);
  const avail=canTake(med);
  const warnings=avail.warnings || [];
  const last=getLastLog(medId);
  const s=getState(medId);
  const nextSafeTs=getNextAvailableTs(med);

  document.getElementById('sheet-title').textContent=med.brand;
  document.getElementById('sheet-subtitle').textContent=`${med.generic} · ${med.note}`;

  const lastHtml=last
    ?`<div class="last-block"><div class="last-lbl">${med.isPain ? 'Last Logged' : 'Last Taken'}</div>
       <div class="last-val">${fmtDateTime(last.time)}</div>
       <div class="last-sub">${med.isPain ? formatPainValue(last.dose) : formatDoseDisplay(med,last.dose)}${last.past?' · past entry':''}${last.override?' · override':''}</div>
      </div>`
    :`<div class="last-block" style="color:var(--ios-lbl2);font-size:15px">No ${med.isPain?'pain entries':'doses'} logged yet</div>`;

  let packHtml='';
  if(med.isPack) {
    const day=getMedrolPackDay(), dayDose=getMedrolDayDose(day);
    packHtml=day<=6
      ?`<div class="pack-day-block"><div class="pack-day-label">Pack day · ${dayDose} tablet${dayDose>1?'s':''} today</div><div class="pack-day-value">Day ${day} of 6</div></div>`
      :`<div class="pack-day-block"><div class="pack-day-label" style="color:var(--ios-green)">✅ Pack complete (6 of 6 days logged)</div></div>`;
  }

  const doseHtml = med.isPack ? '' : buildDoseHtml(medId, false);
  const warningHtml = warnings.length
    ? `<div class="alert-card"><div class="alert-title">⚠️ Overlap Warning</div><div class="alert-body">${warnings.map(w=>w.message).join('\n')}</div></div>`
    : '';

  if (med.isPain) {
    const selected = getEffectiveDose(medId);
    const ready = selected !== null && selected !== undefined && !isNaN(selected);
    document.getElementById('sheet-body').innerHTML=`${lastHtml}${doseHtml}<button class="action-btn ${ready?'btn-green':'btn-disabled'}" id="main-action-btn" ${ready?`onclick="logDose('${medId}')"`:''}>${ready ? `Log Pain — ${formatPainValue(selected)}` : 'Log Pain'}</button>`;
    const picker = document.getElementById('pain-picker');
    if (picker) {
      picker.value = s.selectedDose == null ? '' : Number(s.selectedDose).toFixed(1);
      picker.classList.toggle('placeholder', s.selectedDose == null);
    }
    return;
  }

  const effDose = med.isPack ? `${getMedrolDayDose(getMedrolPackDay())} tabs` : formatDoseDisplay(med, getEffectiveDose(medId));
  let actionHtml='';

  if (avail.ok) {
    if (warnings.length) {
      actionHtml = `<button class="action-btn btn-red" id="main-action-btn" onclick="askOverride('${medId}')">Override — ${effDose}</button>`;
    } else {
      actionHtml = `<button class="action-btn btn-green" id="main-action-btn" onclick="logDose('${medId}')">OK to Take — ${effDose}</button>`;
    }
  } else {
    actionHtml = `<button class="action-btn btn-disabled" id="main-action-btn">Not yet — ${fmtCountdown(avail.msLeft)}</button>
      <button class="action-btn btn-red" id="override-action-btn" onclick="askOverride('${medId}')">Override — ${effDose}</button>`;
  }

  const notifyHtml = nextSafeTs
    ? `<div style="display:flex;gap:10px;margin-bottom:10px">
         <button class="action-btn btn-teal" style="margin-bottom:0;font-size:15px;padding:12px" onclick="launchShortcut('${medId}','reminder')">🔔 Reminder</button>
         <button class="action-btn btn-red" style="margin-bottom:0;font-size:15px;padding:12px" onclick="launchShortcut('${medId}','alarm')">⏰ Alarm</button>
       </div>`
    : '';

  document.getElementById('sheet-body').innerHTML=`${lastHtml}${packHtml}${warningHtml}${doseHtml}${actionHtml}${notifyHtml}`;
  if(s.useCustom) {
    setTimeout(()=>{const el=document.getElementById('custom-dose-input');if(el)el.focus();},80);
  }
}

function selectDose(medId,dose) {
  const s=getState(medId);
  s.selectedDose=dose;
  s.useCustom=false;
  document.querySelectorAll('#dose-chips-wrap .dose-chip').forEach(btn=>{
    if(btn.id==='custom-chip-btn'){btn.classList.remove('sel');return;}
    btn.classList.toggle('sel', parseFloat(btn.textContent)===dose);
  });
  const cr=document.querySelector('.custom-row'); if(cr) cr.remove();
  updateActionBtn(medId);
}
function activateCustom(medId) { getState(medId).useCustom=true; renderSheet(medId); }
function onCustomInput(medId,val) { getState(medId).customVal=val; updateActionBtn(medId); }

function updateActionBtn(medId) {
  const med=getMed(medId), avail=canTake(med), warnings=avail.warnings || [];
  const mainBtn=document.getElementById('main-action-btn');
  const overrideBtn=document.getElementById('override-action-btn');

  if (med.isPain) {
    if (!mainBtn) return;
    const dose = getEffectiveDose(medId);
    const ready = dose !== null && dose !== undefined && !isNaN(dose);
    mainBtn.className = `action-btn ${ready?'btn-green':'btn-disabled'}`;
    mainBtn.textContent = ready ? `Log Pain — ${formatPainValue(dose)}` : 'Log Pain';
    if (ready) mainBtn.setAttribute('onclick', `logDose('${medId}')`);
    else mainBtn.removeAttribute('onclick');
    const picker = document.getElementById('pain-picker');
    if (picker) picker.classList.toggle('placeholder', !ready);
    return;
  }

  const effDose = formatDoseDisplay(med, getEffectiveDose(medId));

  if (avail.ok) {
    if (mainBtn) {
      if (warnings.length) {
        mainBtn.className = 'action-btn btn-red';
        mainBtn.textContent = `Override — ${effDose}`;
        mainBtn.setAttribute('onclick', `askOverride('${medId}')`);
      } else {
        mainBtn.className = 'action-btn btn-green';
        mainBtn.textContent = `OK to Take — ${effDose}`;
        mainBtn.setAttribute('onclick', `logDose('${medId}')`);
      }
    }
  } else {
    if (overrideBtn) {
      overrideBtn.textContent = `Override — ${effDose}`;
      overrideBtn.setAttribute('onclick', `askOverride('${medId}')`);
    }
  }
}

function askOverride(medId) {
  const med = getMed(medId);
  const dose = getEffectiveDose(medId);
  const effDose = formatDoseDisplay(med, dose);
  const avail = canTake(med);
  const warnings = avail.warnings || [];
  const lines = [`${med.brand} — ${effDose}`];

  if (!avail.ok && avail.reason === 'interval') {
    lines.push(`Not due for another ${fmtCountdown(avail.msLeft)}`);
  }
  warnings.forEach(w => lines.push(w.message));

  showConfirm(
    'Override?',
    `${lines.join('\n')}\nLog anyway?`,
    `Override — ${effDose}`,
    true,
    () => logDose(medId, null, false, true)
  );
}

function selectDosePast(medId,dose) {

function activateCustomPast(medId) {

  getState(medId).useCustom=true; openPastSheet(medId);
}
function onCustomInputPast(medId,val) { getState(medId).customVal=val; updatePastBtn(medId); }

function updatePastBtn(medId) {
  const med=getMed(medId);
  const btn=document.getElementById('past-log-btn');
  if(!btn) return;

  if (med.isPain) {
    const dose = getEffectiveDose(medId);
    const ready = dose !== null && dose !== undefined && !isNaN(dose);
    btn.className = `action-btn ${ready?'btn-orange':'btn-disabled'}`;
    btn.textContent = ready ? `↩ Log Past Pain — ${formatPainValue(dose)}` : '↩ Log Past Pain';
    if (ready) btn.setAttribute('onclick', `submitPast('${medId}')`);
    else btn.removeAttribute('onclick');
    const picker = document.getElementById('pain-picker');
    if (picker) picker.classList.toggle('placeholder', !ready);
    return;
  }

  const effDose=formatDoseDisplay(med,getEffectiveDose(medId));

function submitPast(medId) {
  const valid = validateEffectiveDose(medId);
  if (!valid.ok) { showToast('⚠️', valid.msg); return; }

  const inp=document.getElementById('past-dt-input');
  if(!inp||!inp.value){showToast('⚠️','Please pick a date & time');return;}
  const ts=new Date(inp.value).getTime();
  if(isNaN(ts)){showToast('⚠️','Invalid date/time');return;}
  if(ts>Date.now()){showToast('⚠️','Time cannot be in the future');return;}
  getState(medId).pastVal=inp.value;
  logDose(medId,ts,true,false);
  getState(medId).pastVal='';
}

// ─── TRACKER ──────────────────────────────────────────────────────────────────
function renderTracker() {
  const available=MEDS.filter(m=>{
    if (m.isPain) return false;
    const a=canTake(m);
    const last=getLastLog(m.id);
    if (!last || !a.ok || a.warnings.length) return false;
    const elapsed=Date.now()-last.time,iv=m.intervalHours*3600000;
    return elapsed>=iv&&elapsed<iv+1800000;
  });

  let html='<div style="height:8px"></div>';
  html += `<div style="margin:0 16px 12px"><button class="action-btn btn-red" onclick="openSheet('pain')" style="margin-bottom:0">📊 Log Pain Level</button></div>`;

  if(available.length) {
    html+=`<div class="alert-card" style="margin:0 16px 16px"><div class="alert-title">⏰ Now Available</div><div class="alert-body">${available.map(m=>`<strong>${m.brand}</strong>`).join(', ')} can now be taken.</div></div>`;
  }

  html+='<div style="margin:0 16px 20px"><div class="list-group">';
  MEDS.forEach(med=>{
    const avail=canTake(med);
    const warnings=avail.warnings || [];
    const last=getLastLog(med.id);
    const pct = med.isPain ? 100 : (last ? Math.min(100,(Date.now()-last.time)/(med.intervalHours*3600000)*100) : 100);
    const barCls=pct<50?'low':pct<80?'mid':'';
    const readyLabel=(med.id==='dilaudid'||med.id==='xanax'||med.id==='zanaflex')?'OK to Take':'Take Now';

    let badge='';
    if (med.isPain) {
      badge = `<span class="status-pill pill-ok">Log</span>`;
    } else if (warnings.length) {
      badge=`<span class="status-pill pill-warn">Blocked</span>`;
    } else if (med.isPack) {
      const day=getMedrolPackDay();
      if(avail.ok&&day<=6) badge=`<span class="status-pill pill-ok">Day ${day}</span>`;
      else if(day>6) badge=`<span class="status-pill" style="background:rgba(191,90,242,0.18);color:var(--ios-purple)">Done</span>`;
      else badge=`<span class="status-pill pill-wait">${fmtCountdown(avail.msLeft)}</span>`;
    } else {
      badge=avail.ok?`<span class="status-pill pill-ok">${readyLabel}</span>`:`<span class="status-pill pill-wait">${fmtCountdown(avail.msLeft)}</span>`;
    }

    let lastSub='';
    if (med.isPain) {
      lastSub = last ? `Last: ${fmtTime(last.time)} · ${formatPainValue(last.dose)}` : 'No pain logged';
    } else {
      lastSub = last ? `Last: ${fmtTime(last.time)} · ${formatDoseDisplay(med,last.dose)}` : 'No doses logged';
      if (warnings.length) lastSub += ' · overlap warning';
    }

    html+=`<div class="list-row" onclick="openSheet('${med.id}')">
      <div class="med-icon ${med.color}">${med.emoji}</div>
      <div class="med-text">
        <div class="med-name">${med.brand}</div>
        <div class="med-generic">${med.generic}</div>
        <div class="prog-track"><div class="prog-fill ${barCls}" style="width:${pct}%"></div></div>
        <div class="med-sub">${lastSub}</div>
      </div>
      <div class="med-right">${badge}<span class="chev">›</span></div>
    </div>`;
  });
  html+='</div></div>';
  document.getElementById('tracker-content').innerHTML=html;
}

  const filtered = filteredHistoryLogs().sort((a,b)=>b.time-a.time);

    html+=`<div style="padding:0 16px 6px"><div class="list-header">${day}</div></div><div style="margin:0 16px 16px"><div class="list-group">`;
    entries.forEach(log=>{
      const med=getMed(log.medId);
      if(!med) return;
      const dotColor = med.isPain ? getPainColor(log.dose) : (log.override?'var(--ios-red)':log.past?'var(--ios-orange)':'var(--ios-green)');

      const valueText = med.isPain

          <div class="med-generic">${med.generic}${tag}</div>

        <div class="med-right" style="gap:12px">
          <div style="text-align:right">
            <div style="font-size:14px;font-weight:500">${valueText}</div>
            <div style="font-size:12px;color:var(--ios-lbl2)">${fmtTime(log.time)}</div>
          </div>
          <button class="hist-del" onclick="askDelete('${log.id}')">✕</button>
        </div>
      </div>`;
    });
    html+='</div></div>';
  });

  html+=`<button class="copy-btn" onclick="copyToNotes()">📋 Copy for Notes App</button>`;
  html+=`<button class="copy-btn" onclick="exportCSV()" style="margin-top:-8px">📊 Export as CSV</button>`;
  document.getElementById('history-content').innerHTML=html;
}

// ─── INSIGHTS ─────────────────────────────────────────────────────────────────
function setInsightsRange(range) {
  insightsRange = range;
  renderInsights();
}

function getPainLogsSorted() {
  return logs.filter(l => l.medId === 'pain').sort((a,b)=>a.time-b.time);
}

function buildPainGraphSVG(range) {
  const now = Date.now();
  const windowMs = range === '24h' ? 24*3600000 : 7*24*3600000;
  const start = now - windowMs;
  const painLogs = getPainLogsSorted().filter(l => l.time >= start);

  if (!painLogs.length) {
    return `<div class="empty" style="padding:36px 20px"><div class="empty-title" style="font-size:18px">No pain data yet</div><div>Log pain to see the graph.</div></div>`;
  }

  const w = 700, h = 280, left = 44, right = 16, top = 14, bottom = 28;
  const innerW = w-left-right;
  const innerH = h-top-bottom;

  const xFor = t => left + ((t - start) / windowMs) * innerW;
  const yFor = v => top + (1 - (v / 10)) * innerH;

  const points = painLogs.map(p => `${xFor(p.time)},${yFor(p.dose)}`).join(' ');
  const yLines = [0,2.5,5,7.5,10].map(v =>
    `<line x1="${left}" y1="${yFor(v)}" x2="${w-right}" y2="${yFor(v)}" class="graph-grid" />
     <text x="8" y="${yFor(v)+4}" class="graph-axis-label">${v}</text>`
  ).join('');

  const xLabels = range === '24h'
    ? [0,6,12,18,24].map(hr=>{
        const t = start + hr*3600000;
        const d = new Date(t);
        return `<text x="${xFor(t)}" y="${h-8}" text-anchor="middle" class="graph-axis-label">${d.toLocaleTimeString([], {hour:'numeric'})}</text>`;
      }).join('')
    : [0,2,4,6,7].map(day=>{
        const t = start + day*24*3600000;
        const d = new Date(t);
        return `<text x="${xFor(t)}" y="${h-8}" text-anchor="middle" class="graph-axis-label">${d.toLocaleDateString([], {month:'short', day:'numeric'})}</text>`;
      }).join('');

  const dots = painLogs.map(p =>
    `<circle cx="${xFor(p.time)}" cy="${yFor(p.dose)}" r="4.2" fill="${getPainColor(p.dose)}" />`
  ).join('');

  return `
    <div class="graph-wrap">
      <svg viewBox="0 0 ${w} ${h}" class="graph-svg" preserveAspectRatio="none" aria-label="Pain graph">
        ${yLines}
        <polyline points="${points}" class="graph-line" />
        ${dots}
        ${xLabels}
      </svg>
    </div>`;
}

function computeEffectivenessStats() {
  const painLogs = getPainLogsSorted();
  const stats = [];

  Object.entries(EFFECT_WINDOWS).forEach(([medId, win]) => {
    const med = getMed(medId);
    const medLogs = logs.filter(l => l.medId === medId).sort((a,b)=>a.time-b.time);
    const events = [];

    medLogs.forEach(medLog => {
      const baseline = [...painLogs].reverse().find(p => p.time < medLog.time);
      if (!baseline) return;

      const start = medLog.time + win.min * 60000;
      const end = medLog.time + win.max * 60000;
      const post = painLogs.filter(p => p.time >= start && p.time <= end);
      if (!post.length) return;

      const best = Math.min(...post.map(p => Number(p.dose)));
      const relief = Number(baseline.dose) - best;

      events.push({
        dose: medLog.dose,
        baseline: Number(baseline.dose),
        best,
        relief
      });
    });

    const validCount = events.length;
    if (!validCount) {
      stats.push({med, validCount:0});
      return;
    }

    const avgRelief = events.reduce((s,e)=>s+e.relief,0) / validCount;
    const successRate = events.filter(e=>e.relief >= 1.0).length / validCount;

    const doseMap = {};
    events.forEach(e => {
      const key = String(e.dose);
      if (!doseMap[key]) doseMap[key] = [];
      doseMap[key].push(e.relief);
    });

    let bestDose = null;
    Object.entries(doseMap).forEach(([dose, rels]) => {
      const avg = rels.reduce((s,v)=>s+v,0)/rels.length;
      if (!bestDose || avg > bestDose.avg) bestDose = {dose, avg};
    });

    stats.push({
      med,
      validCount,
      avgRelief,
      successRate,
      bestDose,
      events
    });
  });

  return stats.sort((a,b) => (b.avgRelief ?? -999) - (a.avgRelief ?? -999));
}

function insightStatusClass(avgRelief) {
  if (avgRelief >= 2.0) return 'trend-good';
  if (avgRelief >= 0.75) return 'trend-mid';
  return 'trend-bad';
}

function insightStatusLabel(avgRelief) {
  if (avgRelief >= 2.0) return 'Good';
  if (avgRelief >= 0.75) return 'Mixed';
  return 'Poor';
}

function renderInsights() {
  const stats = computeEffectivenessStats();
  let html = '<div style="height:8px"></div>';

  html += `
    <div class="insight-wrap">
      <div class="insight-card">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
          <div>
            <div class="insight-title">Pain Graph</div>
            <div class="insight-sub">Raw pain entries only</div>
          </div>
          <div class="segmented">
            <button class="seg-btn ${insightsRange==='24h'?'active':''}" onclick="setInsightsRange('24h')">24h</button>
            <button class="seg-btn ${insightsRange==='7d'?'active':''}" onclick="setInsightsRange('7d')">7d</button>
          </div>
        </div>
        ${buildPainGraphSVG(insightsRange)}
      </div>
    </div>`;

  html += `<div class="insight-wrap"><div class="list-header" style="padding-left:0">Medication Effectiveness</div></div>`;

  stats.forEach(stat => {
    if (!stat.validCount || stat.validCount < 3) {
      html += `
        <div class="insight-wrap">
          <div class="insight-card">
            <div class="insight-title">${stat.med.brand}</div>
            <div class="insight-sub">Not enough data yet · Need at least 3 valid events</div>
          </div>
        </div>`;
      return;
    }

    const cls = insightStatusClass(stat.avgRelief);
    const label = insightStatusLabel(stat.avgRelief);

    html += `
      <div class="insight-wrap">
        <div class="insight-card">
          <div class="insight-title">${stat.med.brand}</div>
          <div class="insight-sub ${cls}">${label} · ${stat.validCount} valid event${stat.validCount===1?'':'s'}</div>

          <div class="insight-grid">
            <div class="metric">
              <div class="metric-lbl">Avg Relief</div>
              <div class="metric-val ${cls}">-${Math.abs(stat.avgRelief).toFixed(1)}</div>
              <div class="metric-sub">Pain drop</div>
            </div>
            <div class="metric">
              <div class="metric-lbl">Best Dose</div>
              <div class="metric-val">${stat.bestDose.dose}${stat.med.doseUnit}</div>
              <div class="metric-sub">Avg -${Math.abs(stat.bestDose.avg).toFixed(1)}</div>
            </div>
            <div class="metric">
              <div class="metric-lbl">Success Rate</div>
              <div class="metric-val">${Math.round(stat.successRate*100)}%</div>
              <div class="metric-sub">≥ 1.0 relief</div>
            </div>
          </div>
        </div>
      </div>`;
  });

  document.getElementById('insights-content').innerHTML = html;
}

// ─── COPY TO NOTES ────────────────────────────────────────────────────────────
function copyToNotes() {
  const filtered = filteredHistoryLogs().sort((a,b)=>b.time-a.time);
  if(!filtered.length){showToast('⚠️','No history to copy');return;}

  const byDay={};
  filtered.forEach(log=>{const d=fmtDate(log.time);if(!byDay[d])byDay[d]=[];byDay[d].push(log);});
  let text="Tom's Medication Log\n";
  text+=`Generated: ${new Date().toLocaleDateString([],{weekday:'long',year:'numeric',month:'long',day:'numeric'})}\n${'─'.repeat(32)}\n\n`;

  Object.entries(byDay).forEach(([day,entries])=>{
    text+=`${day}\n`;
    entries.forEach(log=>{
      const med=getMed(log.medId);
      const tags=[log.past?'past':'',log.override?'override':''].filter(Boolean).join(', ');
      const label = med?.isPain
        ? `Pain ${formatPainValue(log.dose)}`
        : `${(med?med.brand:log.medId).padEnd(14)} ${formatDoseDisplay(med, log.dose)}`;
      text+=`  ${fmtTime(log.time).padEnd(10)} ${label}${tags?' ['+tags+']':''}\n`;
    });
    text+='\n';
  });

  navigator.clipboard.writeText(text).then(()=>showToast('📋','Copied! Paste into Notes')).catch(()=>prompt('Copy and paste into Notes:',text));
}

function exportCSV() {
  const filtered = filteredHistoryLogs().sort((a,b)=>a.time-b.time);
  if(!filtered.length){showToast('⚠️','No history to export');return;}

  const rows = [
    ['Date','Time','Medication','Generic','Dose','Unit','Type']
  ];

  filtered.forEach(log=>{
    const med = getMed(log.medId);
    const d = new Date(log.time);
    const type = log.override ? 'override' : log.past ? 'past' : 'normal';
    rows.push([
      d.toLocaleDateString([],{year:'numeric',month:'2-digit',day:'2-digit'}),
      d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:true}),
      med ? med.brand : log.medId,
      med ? med.generic : '',
      log.dose,
      log.unit,
      type
    ]);
  });

  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `toms-meds-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📊','CSV downloaded');
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  if(currentTab==='tracker') renderTracker();
  else if(currentTab==='past') renderPast();
  else if(currentTab==='history') renderHistory();
  else renderInsights();
}

setInterval(loadFromCloud, 30000);
render();
loadFromCloud();
</script>
